# Stage routing
#
# Determines which questions apply at which stage, and adjusts the
# dimension weightings used to aggregate the overall NIRE score.

version: 0.1.0

# ─────────────────────────────────────────────────────────────────
# Dimension weights by stage
# ─────────────────────────────────────────────────────────────────
# These weights are used when aggregating dimension scores into the
# overall NIRE score. Sum must equal 1.0 for each stage.

dimension-weights:
  pre-seed:
    founder-team: 0.25
    problem-insight: 0.20
    market: 0.15
    product-traction: 0.05
    business-model: 0.05
    go-to-market: 0.10
    competition-moat: 0.10
    round-capital: 0.10

  seed:
    founder-team: 0.20
    problem-insight: 0.12
    market: 0.12
    product-traction: 0.18
    business-model: 0.12
    go-to-market: 0.10
    competition-moat: 0.08
    round-capital: 0.08

  series-a:
    founder-team: 0.12
    problem-insight: 0.05
    market: 0.10
    product-traction: 0.22
    business-model: 0.18
    go-to-market: 0.15
    competition-moat: 0.10
    round-capital: 0.08

  series-b:
    founder-team: 0.10
    problem-insight: 0.03
    market: 0.10
    product-traction: 0.25
    business-model: 0.20
    go-to-market: 0.17
    competition-moat: 0.10
    round-capital: 0.05

# ─────────────────────────────────────────────────────────────────
# Question visibility overrides by stage
# ─────────────────────────────────────────────────────────────────
# Specific questions that should be hidden at certain stages even if
# their applies-to field permits them.

visibility-overrides:
  pre-seed:
    hide:
      - q1.14  # Hiring philosophy: not yet relevant pre-seed
      # Future overrides for dimensions 2-8 added here

  seed:
    hide: []

  series-a:
    hide: []

# ─────────────────────────────────────────────────────────────────
# Question weighting overrides by stage
# ─────────────────────────────────────────────────────────────────
# Some questions are weighted differently depending on stage.

weighting-overrides:
  pre-seed:
    # At pre-seed, advisor structure is less important
    q1.9:
      weight-multiplier: 0.5
    # Founder-market fit is most important at pre-seed
    q1.5:
      weight-multiplier: 1.3
  seed:
    # Function coverage gaps matter more at seed
    q1.4:
      weight-multiplier: 1.2
  series-a:
    # Hiring philosophy is critical at Series A
    q1.14:
      weight-multiplier: 1.5
    # Team scaling questions weighted higher
    q1.7:
      weight-multiplier: 1.3
