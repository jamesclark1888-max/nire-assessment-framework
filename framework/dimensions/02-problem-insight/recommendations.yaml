# Dimension 2: Problem & Insight
# Recommendation templates
#
# Validated against: schema/recommendation.schema.json
#
# Each template defines a recommendation triggered by specific scoring conditions
# and personalised at runtime using the founder's specific data.
#
# free-tier-visible: true means the recommendation appears in the free report.
# Others are paywalled.

dimension: problem-insight
version: 0.1.0
templates:

  # -----------------------------------------------------------------
  # Problem articulation -- weak
  # -----------------------------------------------------------------
  - id: weak-problem-articulation
    trigger:
      question-ids: [q2.1]
      score-band: low
    priority: critical
    free-tier-visible: true
    diagnostic: |
      Your problem description reads from the product's perspective, not
      the customer's. Phrases like "our platform solves", "we enable", or
      "we help companies do X" describe a solution. Investors need to hear
      the customer's problem before they can assess whether the product
      addresses something real.
    gap: |
      Your problem statement is not written in customer language yet. A
      credible problem statement names the customer, the specific pain,
      how often it occurs, and what it costs. Without those four elements,
      the problem-market fit question stays open.
    fix: |
      Rewrite the problem statement using this structure:
      1. Who: name the specific customer (e.g. "Head of Finance at a
         50-200 person SaaS company")
      2. What: name the specific task or situation that causes pain
      3. Frequency: how often this happens
      4. Cost: what it costs in time, money, errors, or risk
      5. Why current alternatives fail: one sentence

      Test it by reading it aloud to someone outside the industry. If they
      understand the pain immediately, the framing is working.
    evidence: |
      The problem statement is typically the first paragraph of a pitch.
      Investors filter on it before they read anything else. A clear,
      customer-centric problem description earns the next 30 seconds of
      attention in a first meeting.
    stage-variants:
      pre-seed:
        diagnostic: |
          At pre-seed, the problem statement is often the only concrete
          thing available. A vague one is a difficult starting point.
        fix: |
          For pre-seed, the test is: can you describe the problem to someone
          who has never heard of this space and have them immediately say
          "yes, that sounds like a real and annoying problem"? If not, keep
          iterating.
      series-a:
        diagnostic: |
          At Series A, a solution-first problem statement is a more serious
          concern. It suggests the problem has not been revisited since
          founding, despite 12 or more months of customer feedback.
        fix: |
          Revisit the problem statement with your latest customer data. What
          have you learned in the last 12 months that sharpens it?

  # -----------------------------------------------------------------
  # Problem articulation -- improvable
  # -----------------------------------------------------------------
  - id: improvable-problem-articulation
    trigger:
      question-ids: [q2.1]
      score-band: medium
    priority: high
    free-tier-visible: false
    diagnostic: |
      Your problem description has the right shape. It is customer-focused
      and reasonably specific. But it is missing either a quantified cost, a
      named customer segment, or enough specificity to feel distinct from a
      generic market description.
    gap: |
      Specifically: [dynamic: missing element from rubric, e.g. no quantified
      cost, no named segment, too broad to be actionable].
    fix: |
      Add the missing element. The upgrade that moves most descriptions from
      medium to high is quantification. "This takes 8 hours a week" or "This
      costs approximately £30k per FTE per year in wasted time" transforms a
      narrative into a buying trigger.
    evidence: |
      Quantified problem statements are more memorable. Investors relay them
      more easily when making the case internally. Every number that sticks
      is a word-of-mouth lever.
    estimated-impact:
      dimension-score-uplift: 8
      confidence: medium

  # -----------------------------------------------------------------
  # Customer discovery -- insufficient
  # -----------------------------------------------------------------
  - id: insufficient-customer-discovery
    trigger:
      question-ids: [q2.2]
      score-band: low
    priority: critical
    free-tier-visible: true
    diagnostic: |
      You have spoken to very few potential customers about this problem. At
      this level of discovery, your business rests on hypothesis more than
      evidence. Most top-tier investors will not commit at this discovery
      stage.
    gap: |
      Your customer conversation count is below what investors expect for
      this stage. For pre-seed, 15-30 is the minimum. For seed, 50 or more
      is strong. This gap needs closing before you raise.
    fix: |
      Run a structured customer discovery sprint:
      1. Identify 50 specific people who match your ideal customer persona
      2. Get warm introductions to at least 20 via LinkedIn, mutual
         connections, or community groups
      3. Run 30-45 minute problem-focused interviews, not product demos
      4. Use the Mom Test framework: ask about their life, their existing
         tools, their biggest frustrations, not about your solution
      5. Document every interview with notes. The documentation itself
         becomes an asset in investor conversations.
    evidence: |
      Founders who answer the discovery question with single-digit or low
      double-digit numbers almost always lose the meeting. The count has
      become a proxy for how seriously the founder takes evidence over
      intuition.
    stage-variants:
      pre-seed:
        fix: |
          For pre-seed, 15-30 substantive interviews is the minimum for
          credibility. 50 or more puts you in the top quartile. Quality
          matters more than quantity, but you need both.
      seed:
        fix: |
          By seed, raising on customer discovery alone (without product
          traction) needs 50-100 or more interviews and rich documented
          learnings to compensate. More practically, use this gap as a
          reason to get product in front of customers faster.

  # -----------------------------------------------------------------
  # Customer discovery -- deepen
  # -----------------------------------------------------------------
  - id: deepen-customer-discovery
    trigger:
      question-ids: [q2.2]
      score-band: medium
    priority: medium
    free-tier-visible: false
    diagnostic: |
      Your discovery count is reasonable but below the top quartile for
      this stage. The evidence base is there, but you can strengthen it
      by diversifying who you have spoken to.
    gap: |
      More conversations with different customer profiles (different company
      sizes, geographies, or roles) would increase the credibility of your
      evidence base.
    fix: |
      Target 10-20 more interviews in segments not yet covered: a
      different geography, a different company size band, or a different
      buying persona. Cross-segment consistency strengthens the thesis.
      Divergence is equally valuable.
    evidence: |
      Discovery breadth across segments is the difference between "we
      validated this with a handful of similar customers" and "we tested
      this across different contexts and the pattern holds". Investors
      notice the difference in due diligence.
    estimated-impact:
      dimension-score-uplift: 5
      confidence: low

  # -----------------------------------------------------------------
  # Core insight -- weak
  # -----------------------------------------------------------------
  - id: weak-core-insight
    trigger:
      question-ids: [q2.3]
      score-band: low
    priority: critical
    free-tier-visible: true
    diagnostic: |
      Your core insight answer restates the problem, or makes a broad
      market observation ("the market is large and fragmented") rather
      than naming a specific non-obvious truth. This is the most common
      failure mode on this question.
    gap: |
      Your answer does not identify what your business knows about the
      problem that competitors do not. Without a non-obvious insight, your
      company is executing on an idea that competitors are also pursuing.
      That makes winning customers harder and gives investors less reason
      to believe this business will dominate its market.
    fix: |
      Work backwards to find the insight:
      1. What did you learn from customer conversations that was surprising?
      2. What does every competitor get wrong about this market?
      3. What would a smart person push back on if you told them?
      4. What domain knowledge did your founding team have before starting
         that others in the market do not have access to?

      The insight does not need to be world-changing. "Every prior solution
      was built for the CTO; we discovered the CFO has the actual pain and
      the budget" is a strong, specific, non-obvious insight.
    evidence: |
      The "why us, why now" question in investor meetings is ultimately a
      question about insight. Founders who can state a specific non-consensus
      belief and back it with evidence convert more scepticism than any
      traction number at pre-seed.
    stage-variants:
      pre-seed:
        diagnostic: |
          At pre-seed, a non-obvious insight is often the primary thing
          an investor is backing. Its absence is a significant filter
          at this stage.
      seed:
        diagnostic: |
          At seed, insight is still highly weighted. If your problem
          definition has narrowed since founding, your insight may have
          sharpened too. Make sure your answer reflects the current version.

  # -----------------------------------------------------------------
  # Core insight -- improvable
  # -----------------------------------------------------------------
  - id: improvable-core-insight
    trigger:
      question-ids: [q2.3]
      score-band: medium
    priority: high
    free-tier-visible: false
    diagnostic: |
      Your core insight has the right shape. It diverges from conventional
      wisdom. But it lacks either the specificity or the evidential grounding
      to be fully convincing.
    gap: |
      Specifically: [dynamic: missing element, e.g. the claim is too broad
      to be falsifiable, no source for why you know this, or the insight
      does not connect to why your approach is the right one].
    fix: |
      Tighten the insight in two steps:
      1. Make it falsifiable: state it as a claim someone could disprove
         with specific counter-evidence
      2. Add your evidence: why do you know this and others do not?
      The strongest insights are both non-obvious and grounded in specific
      evidence the founder has that competitors do not.
    evidence: |
      Insights stated precisely and backed by evidence are the ones that
      travel well through investor networks. Specificity is what makes
      them retellable.
    estimated-impact:
      dimension-score-uplift: 10
      confidence: medium

  # -----------------------------------------------------------------
  # Timing thesis -- weak
  # -----------------------------------------------------------------
  - id: weak-timing-thesis
    trigger:
      question-ids: [q2.4]
      score-band: low
    priority: high
    free-tier-visible: true
    diagnostic: |
      Your timing thesis relies on general trend statements: AI, digital
      transformation, market readiness. Investors have heard these references
      many times and discount them. What is missing is a named, specific
      catalyst that makes this moment different from two years ago or two
      years from now.
    gap: |
      Your answer has not identified a specific change that makes this moment
      distinctly better for building this company than an earlier or later
      start would have been.
    fix: |
      Look for the timing answer in one of these places:
      1. Enabling technology: has a specific new capability, cheaper compute,
         a new API, or a new model become available that makes this product
         possible or economically viable for the first time?
      2. Regulation: has a law passed or a deadline arrived that creates a
         compliance requirement your product solves?
      3. Behaviour shift: has a specific behaviour changed at scale that
         creates your customer segment?
      4. Incumbent withdrawal: has a dominant player exited a segment or
         raised prices dramatically, creating an opening?
      If none of these apply, the argument may be that the problem is large
      and enduring enough to build on regardless. That is a valid answer, but
      it needs to be stated explicitly.
    evidence: |
      The "why now" question is asked in virtually every investor meeting.
      It is not a polite opener. Founders who answer it specifically signal
      market intelligence. Founders who give a trend-based answer signal
      generic thinking.
    stage-variants:
      pre-seed:
        fix: |
          For pre-seed, any named catalyst with basic evidence is sufficient
          to establish a credible timing argument.
      series-a:
        fix: |
          At Series A, the timing argument typically needs updating. What has
          changed in the market since founding that further validates the
          moment? New regulations, new data points, or new competitive dynamics
          all strengthen the case.

  # -----------------------------------------------------------------
  # Timing thesis -- improvable
  # -----------------------------------------------------------------
  - id: improvable-timing-thesis
    trigger:
      question-ids: [q2.4]
      score-band: medium
    priority: medium
    free-tier-visible: false
    diagnostic: |
      Your timing thesis names a catalyst but does not fully demonstrate
      its impact or show why it specifically advantages your approach
      over others.
    gap: |
      A named catalyst is the floor. The ceiling is quantifying its impact
      and connecting it to why your specific solution is the right response.
    fix: |
      Add two elements to your timing answer:
      1. How significant is the change in numerical terms?
      2. Why does this specific change make your approach the right one,
         rather than a competitor's?
    evidence: |
      A quantified timing thesis ("inference costs are down 40x, making our
      unit economics viable for the first time") is far more memorable than
      a directional one ("AI has become cheaper").
    estimated-impact:
      dimension-score-uplift: 7
      confidence: medium

  # -----------------------------------------------------------------
  # Problem evidence -- weak
  # -----------------------------------------------------------------
  - id: weak-problem-evidence
    trigger:
      question-ids: [q2.5]
      score-band: low
    priority: high
    free-tier-visible: true
    diagnostic: |
      Your external validation of the problem is very limited. At this
      evidence level, investors treat the problem as an unvalidated
      hypothesis. This is the most common reason early-stage pitches
      do not progress.
    gap: |
      Your evidence signals are too few or too weak to establish that the
      problem is real, urgent, and large enough to build on.
    fix: |
      Prioritise acquiring one high-quality evidence signal before you raise:
      1. Fastest: get 5 or more documented customer interviews where
         respondents describe the problem in their own words, unprompted
      2. Most powerful: get one paying customer, even at a nominal amount.
         Payment is the clearest signal of a real problem.
      3. Most scalable: run a targeted outbound campaign offering free use
         in exchange for feedback. Unsolicited inbounds from that campaign
         count as validation.
      Document everything. The documentation is itself a useful asset in
      investor conversations.
    evidence: |
      The gap between "I believe this is a problem" and "customers are
      paying to solve this" is the gap between a hypothesis and a business.
      Investors price this gap into valuation directly.

  # -----------------------------------------------------------------
  # Problem evidence -- strengthen
  # -----------------------------------------------------------------
  - id: strengthen-problem-evidence
    trigger:
      question-ids: [q2.5]
      score-band: medium
    priority: medium
    free-tier-visible: false
    diagnostic: |
      You have some evidence signals, but they are concentrated in a single
      type. Multiple independent signal types are more credible than depth
      in a single source.
    gap: |
      Adding a second independent evidence type would materially strengthen
      your problem validation story.
    fix: |
      Identify the easiest additional signal to acquire and pursue it:
      - If you have documented interviews, pursue a pilot or letter of intent
      - If you have market research, pursue direct customer conversations
      - If you have personal experience, acquire documented interviews to
        corroborate that experience externally
    evidence: |
      One source is a finding. Two independent sources are a pattern.
      Investors apply the same logic when assessing problem validation.
    estimated-impact:
      dimension-score-uplift: 6
      confidence: medium

  # -----------------------------------------------------------------
  # Problem severity -- low
  # -----------------------------------------------------------------
  - id: low-problem-severity
    trigger:
      question-ids: [q2.7]
      score-band: low
    priority: high
    free-tier-visible: true
    diagnostic: |
      The customers you have spoken to characterise this problem as low
      severity. It is an inefficiency they would address if convenient, not an
      urgent pain. This is a significant signal about product-market fit
      risk and how much customers will pay.
    gap: |
      Low-severity problems produce products that are nice-to-have rather
      than must-have. This directly limits willingness to pay, sales
      velocity, and your ability to build a fundable business.
    fix: |
      Three possible paths:
      1. Refine the problem statement: a low-severity version of a problem
         often exists alongside a high-severity version in the same market.
         Find the customer for whom this is mission-critical, not just useful.
      2. Reframe the consequence: is there a downstream consequence of this
         problem (a risk, a regulatory exposure, a lost deal) that elevates
         severity for a subset of customers?
      3. Pivot the segment: the same functional problem can be low-severity
         for SMEs and mission-critical for enterprise. Move up or down market
         and test whether severity changes.
    evidence: |
      Low-severity problems produce long sales cycles, high churn at renewal,
      and compressed pricing. Finding the "hair on fire" segment, even if it is
      smaller, is almost always worth the search.

  # -----------------------------------------------------------------
  # Problem severity -- medium
  # -----------------------------------------------------------------
  - id: medium-problem-severity
    trigger:
      question-ids: [q2.7]
      score-band: medium
    priority: medium
    free-tier-visible: false
    diagnostic: |
      Your customers see this as meaningful pain, but workarounds exist and
      are used. This is a buildable foundation, but it requires clear thinking
      about pricing and sales motion to avoid being positioned as a nice-to-have.
    gap: |
      Medium-severity problems often require more customer evangelism, longer
      sales cycles, and more conservative initial pricing than high-severity ones.
    fix: |
      Find the sub-segment where severity is higher. Ask: for which 10% of your
      current customer interviews was the problem clearly the most severe? That
      cohort is your beachhead segment. Build your initial go-to-market around
      them, not the average.
    evidence: |
      The beachhead strategy (starting with customers for whom the product is
      mission-critical and expanding out) is the most reliable path to early
      revenue for mid-severity problems.

  # -----------------------------------------------------------------
  # Prior attempts -- weak
  # -----------------------------------------------------------------
  - id: weak-prior-attempts-knowledge
    trigger:
      question-ids: [q2.9]
      score-band: low
    priority: medium
    free-tier-visible: false
    diagnostic: |
      Your knowledge of prior attempts to solve this problem is either absent
      or superficial. This creates a vulnerability: investors will name prior
      failures and test whether your team knows them.
    gap: |
      "Why hasn't anyone done this before?" is one of the most common investor
      questions. Without a specific, structural answer, your credibility falls
      quickly.
    fix: |
      Spend 2-3 hours on prior-attempt research:
      1. Search Crunchbase and LinkedIn for companies that tried this and
         failed, or pivoted away from this exact problem
      2. Search for relevant Y Combinator companies from 2012-2020 that no
         longer exist
      3. Ask your earliest customers: "What did you try before accepting the
         current workaround?"
      For each prior attempt: what was their thesis? What did they build? What
      specifically went wrong? Was it the wrong buyer, wrong pricing model,
      wrong technology, or wrong timing?
    evidence: |
      Founders who name specific prior failures and explain the structural
      reason they failed signal deep market intelligence. It is one of the
      fastest ways to establish credibility in a first meeting.

