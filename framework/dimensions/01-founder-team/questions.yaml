# Dimension 1: Founder & Team
# Questions
#
# This file defines all questions for the Founder & Team dimension.
# Validated against: schema/question.schema.json
#
# Conventions:
# - Required tier: 5 questions, sufficient for a meaningful score
# - Recommended tier: 5 questions, improve confidence and recommendation sharpness
# - Optional tier: 4 questions, for founders seeking maximum precision
# - Regional layers follow the regional pattern (q1.uk1, q1.fr1, etc.)

dimension: founder-team
version: 0.1.0
questions:

  # ─────────────────────────────────────────────────────────────────
  # REQUIRED TIER
  # ─────────────────────────────────────────────────────────────────

  - id: q1.1
    dimension: founder-team
    tier: required
    type: single-select
    question: "How many co-founders are there, including yourself?"
    helper-text: "We count anyone with founder-level equity (typically 10%+) and full-time commitment."
    why-it-matters: |
      Solo founders face higher VC scepticism, especially at seed and beyond.
      Teams of 4+ raise governance and equity-dilution questions. The optimal
      pattern is 2-3 complementary co-founders.
    options:
      - value: "1"
        label: "1 (solo founder)"
      - value: "2"
        label: "2"
      - value: "3"
        label: "3"
      - value: "4"
        label: "4"
      - value: "5+"
        label: "5 or more"
    applies-to:
      stages: all
      business-models: all
      regions: all
    scoring:
      type: categorical
      weight: 0.10
      rubric-ref: cofounder-count-categorical
    recommendation-trigger:
      low-score: solo-founder-no-plan
      medium-score: team-size-suboptimal
      high-score: null
    version-added: "0.1.0"

  - id: q1.2
    dimension: founder-team
    tier: required
    type: repeating-block
    question: "For each co-founder (including yourself), please provide their details."
    helper-text: "Add a row for each co-founder. This data shapes how your team is benchmarked."
    why-it-matters: |
      Equity splits, commitment levels, and experience are the most underwriting-
      relevant team data points. Part-time founders at seed and beyond are a
      yellow flag. Equity splits that are dramatically uneven (e.g. 90/10)
      raise questions about co-founder commitment.
    fields:
      - name: full-name
        type: short-text
        label: "Full name"
        required: true
      - name: role
        type: short-text
        label: "Role / title (e.g. CEO, CTO)"
        required: true
      - name: linkedin-url
        type: short-text
        label: "LinkedIn URL"
        required: false
      - name: relevant-experience-years
        type: number
        label: "Years of relevant industry experience"
        required: true
      - name: equity-percent
        type: percentage
        label: "Equity ownership (%)"
        required: true
      - name: commitment
        type: single-select
        label: "Commitment level"
        required: true
      - name: joined-date
        type: date
        label: "Date they joined the company"
        required: true
    validation:
      min-items: 1
      max-items: 6
      count-question: q1.1
    applies-to:
      stages: all
      business-models: all
      regions: all
    scoring:
      type: composite
      weight: 0.20
      rubric-ref: cofounder-details-composite
    recommendation-trigger:
      low-score: founder-equity-or-commitment-issue
      medium-score: founder-experience-gaps
      high-score: null
    version-added: "0.1.0"

  - id: q1.3
    dimension: founder-team
    tier: required
    type: single-select
    question: "How long have the co-founders worked together previously (before this company)?"
    helper-text: "Co-founder breakups are the leading cause of early-stage failure. Prior working relationship strongly predicts avoiding this."
    why-it-matters: |
      Studies consistently show co-founder conflict is the #1 cause of early-
      stage failure. Founders who have worked together for 3+ years prior have
      meaningfully lower breakup rates. This is one of the highest-signal
      single questions in the assessment.
    options:
      - value: never
        label: "Never worked together before"
      - value: less-than-1
        label: "Less than 1 year"
      - value: 1-to-3
        label: "1 to 3 years"
      - value: 3-plus
        label: "3 or more years"
      - value: not-applicable
        label: "Not applicable (solo founder)"
    applies-to:
      stages: all
      business-models: all
      regions: all
    scoring:
      type: categorical
      weight: 0.15
      rubric-ref: working-relationship-categorical
    recommendation-trigger:
      low-score: weak-cofounder-relationship
      medium-score: developing-cofounder-relationship
      high-score: null
    version-added: "0.1.0"

  - id: q1.4
    dimension: founder-team
    tier: required
    type: multi-select
    question: "Which of these critical functions are currently covered by a co-founder or senior hire?"
    helper-text: "Check all that apply. Functions not currently covered are not failures but are noted for gap analysis."
    why-it-matters: |
      Function coverage is one of the clearest early indicators of execution
      capability. A SaaS startup with no commercial leader at seed faces
      different risk than one with strong commercial leadership. Different
      VC archetypes weight these gaps differently.
    options:
      - value: technical
        label: "Technical / Engineering leadership"
      - value: product
        label: "Product leadership"
      - value: commercial
        label: "Sales / Commercial leadership"
      - value: marketing
        label: "Marketing leadership"
      - value: operations
        label: "Operations leadership"
      - value: finance
        label: "Finance leadership"
      - value: domain-expertise
        label: "Deep domain expertise in our sector"
    validation:
      min-items: 0
      max-items: 7
    applies-to:
      stages: all
      business-models: all
      regions: all
    scoring:
      type: multi-select-coverage
      weight: 0.15
      rubric-ref: function-coverage-multi-select
    recommendation-trigger:
      low-score: critical-function-gaps
      medium-score: function-coverage-gaps
      high-score: null
    version-added: "0.1.0"

  - id: q1.5
    dimension: founder-team
    tier: required
    type: long-text
    question: "In one paragraph, why are YOU the right person/team to solve this problem?"
    helper-text: |
      Be specific. The strongest answers include concrete evidence: prior roles
      solving this problem, proprietary insight, time spent with customers,
      personal experience of the pain point. Generic answers score lower.
    why-it-matters: |
      Founder-market fit is the qualitative input most predictive of VC
      conviction. AI evaluates against a rubric covering specificity,
      evidence, unfair advantage, and clarity. Generic answers ("we're
      passionate") score lower than specific ones ("I spent 8 years at X
      watching this problem unfold; my co-founder built the v1 internal
      tool that became the basis for our product").
    validation:
      min-chars: 200
      max-chars: 1000
    show-if:
      conditions:
        - field: preq.stage
          operator: in
          values:
            - pre-seed
            - seed
    applies-to:
      stages: all
      business-models: all
      regions: all
    scoring:
      type: ai-qualitative
      weight: 0.15
      rubric-ref: founder-market-fit-rubric
    recommendation-trigger:
      low-score: generic-founder-market-fit
      medium-score: improvable-founder-market-fit
      high-score: null
    version-added: "0.1.0"

  # ─────────────────────────────────────────────────────────────────
  # RECOMMENDED TIER
  # ─────────────────────────────────────────────────────────────────

  - id: q1.6
    dimension: founder-team
    tier: recommended
    type: repeating-block
    question: "For each founder, have they started a company before?"
    helper-text: "Failure with documented lessons is often valued more than no experience at all."
    why-it-matters: |
      Repeat founders, especially those who have failed and learned, score
      higher with most VCs. A successful exit is the strongest signal; an
      unsuccessful previous attempt with articulated lessons is still
      meaningfully positive. First-time founders are the norm at pre-seed
      and not a flag.
    fields:
      - name: founder-name
        type: short-text
        label: "Founder name"
        required: true
      - name: prior-company-status
        type: single-select
        label: "Prior company status"
        required: true
    applies-to:
      stages: all
      business-models: all
      regions: all
    scoring:
      type: composite
      weight: 0.08
      rubric-ref: prior-founder-experience
    recommendation-trigger:
      low-score: null
      medium-score: null
      high-score: null
    version-added: "0.1.0"

  - id: q1.7
    dimension: founder-team
    tier: recommended
    type: number
    question: "What's the current total full-time team size, including founders?"
    helper-text: "Count only full-time team members. Part-time, contractors, and advisors are excluded."
    why-it-matters: |
      Team size benchmarked against stage indicates capital efficiency and
      execution capacity. Pre-seed teams of 2-4 are typical. Seed teams of
      5-12 are typical. Outliers (very small or very large) prompt follow-up.
    validation:
      min: 1
      max: 500
    applies-to:
      stages: all
      business-models: all
      regions: all
    scoring:
      type: quantitative-threshold
      weight: 0.05
      benchmark-ref: team-size-by-stage
    recommendation-trigger:
      low-score: null
      medium-score: team-size-mismatch
      high-score: null
    version-added: "0.1.0"

  - id: q1.8
    dimension: founder-team
    tier: recommended
    type: multi-select
    question: "What roles do you most urgently need to hire in the next 6 months?"
    helper-text: "Select up to 5. This tells us how aware you are of your own gaps."
    why-it-matters: |
      The hiring priorities a founder identifies reveal self-awareness about
      gaps. Consistency between this answer and Q1.4 (function coverage) is
      a cross-question check.
    options:
      - value: senior-engineering
        label: "Senior engineering / CTO"
      - value: engineering
        label: "Engineering hires"
      - value: product
        label: "Product manager / Head of Product"
      - value: commercial
        label: "Sales / Head of Sales"
      - value: marketing
        label: "Marketing / Growth"
      - value: operations
        label: "Operations / COO"
      - value: finance
        label: "Finance / CFO"
      - value: customer-success
        label: "Customer success"
      - value: design
        label: "Design"
      - value: data
        label: "Data / Analytics"
      - value: other
        label: "Other"
    validation:
      min-items: 0
      max-items: 5
    applies-to:
      stages: all
      business-models: all
      regions: all
    scoring:
      type: informational-only
      weight: 0.02
    consistency-checks:
      - hiring-priorities-vs-function-coverage
    recommendation-trigger:
      low-score: null
      medium-score: hiring-priorities-misaligned
      high-score: null
    version-added: "0.1.0"

  - id: q1.9
    dimension: founder-team
    tier: recommended
    type: single-select
    question: "What's your current advisor and board structure?"
    helper-text: "We are looking for the most formal structure you currently have."
    why-it-matters: |
      Structured advisor and board involvement signals operational maturity
      and access to talent and capital. Stage-appropriate structures vary:
      pre-seed founders are not expected to have formal boards; seed-stage
      founders increasingly are.
    options:
      - value: formal-board-with-independents
        label: "Formal board with independent directors"
      - value: formal-board-investors-only
        label: "Formal board (investor seats only)"
      - value: informal-advisory-board
        label: "Informal advisory board (group of advisors)"
      - value: individual-advisors
        label: "Individual advisors only"
      - value: mentor-relationships
        label: "Mentor relationships, no formal structure"
      - value: none-yet
        label: "None yet"
    applies-to:
      stages: all
      business-models: all
      regions: all
    scoring:
      type: categorical
      weight: 0.05
      rubric-ref: advisor-structure-categorical
    recommendation-trigger:
      low-score: no-advisor-structure
      medium-score: develop-advisor-structure
      high-score: null
    version-added: "0.1.0"

  - id: q1.10
    dimension: founder-team
    tier: recommended
    type: long-text
    question: "What are the biggest risks or tensions in your founding team, and how are you managing them?"
    helper-text: |
      This answer is used only for analysis and is not shared with VCs. We
      score thoughtful honesty higher than defensive denial.
    why-it-matters: |
      Self-aware founders are dramatically easier to back. The strongest
      answers acknowledge real tensions and explain frameworks for resolving
      them ("my co-founder and I disagree about pace; we've agreed quarterly
      strategic reviews and split decision authority by domain"). Deflective
      answers ("we have no risks") score the lowest.
    validation:
      min-chars: 100
      max-chars: 1000
    applies-to:
      stages: all
      business-models: all
      regions: all
    scoring:
      type: ai-qualitative
      weight: 0.10
      rubric-ref: self-awareness-rubric
    recommendation-trigger:
      low-score: deflective-self-assessment
      medium-score: improvable-self-awareness
      high-score: null
    version-added: "0.1.0"

  # ─────────────────────────────────────────────────────────────────
  # OPTIONAL DEEP-DIVE
  # ─────────────────────────────────────────────────────────────────

  - id: q1.11
    dimension: founder-team
    tier: optional
    type: file-upload
    question: "Optional: tell us more about your team."
    helper-text: |
      Examples: your team page, LinkedIn profiles, or the team section of your
      pitch deck. Helps us provide sharper analysis. Shared with VCs only with
      your explicit consent.
    why-it-matters: |
      Document uploads materially increase confidence rating. They also enable
      richer AI analysis (e.g. checking whether stated founder backgrounds
      match LinkedIn).
    validation:
      pattern: "\\.(pdf|pptx|docx|png|jpg|jpeg)$"
    applies-to:
      stages: all
      business-models: all
      regions: all
    scoring:
      type: informational-only
      weight: 0.00
    version-added: "0.1.0"

  - id: q1.12
    dimension: founder-team
    tier: optional
    type: structured-input
    question: "What's the vesting schedule for founder equity?"
    helper-text: "Standard is 4-year vesting with a 1-year cliff. VCs strongly prefer founder vesting on raised rounds."
    why-it-matters: |
      Founder vesting protects the company if a founder leaves. The absence
      of vesting is a frequent VC follow-up and often a condition of investment.
    fields:
      - name: vesting-in-place
        type: single-select
        label: "Is founder vesting in place?"
        required: true
      - name: vesting-period-years
        type: number
        label: "Vesting period (years)"
        required: false
      - name: cliff-months
        type: number
        label: "Cliff period (months)"
        required: false
    applies-to:
      stages: all
      business-models: all
      regions: all
    scoring:
      type: composite
      weight: 0.05
      rubric-ref: founder-vesting-composite
    recommendation-trigger:
      low-score: no-founder-vesting
      medium-score: weak-founder-vesting
      high-score: null
    version-added: "0.1.0"

  - id: q1.13
    dimension: founder-team
    tier: optional
    type: long-text
    question: "Have any founders left the company since inception? If yes, briefly explain."
    helper-text: "Founder departures are not necessarily negative if handled cleanly. We are looking for transparency."
    why-it-matters: |
      VCs will discover prior founder departures during diligence. Founders
      who proactively disclose and explain score higher than those who omit.
      Clean documented departures with reassigned equity are far better than
      contested ones.
    validation:
      min-chars: 0
      max-chars: 1000
    applies-to:
      stages: all
      business-models: all
      regions: all
    scoring:
      type: ai-qualitative
      weight: 0.03
      rubric-ref: founder-departure-rubric
    recommendation-trigger:
      low-score: messy-founder-departure
      medium-score: null
      high-score: null
    version-added: "0.1.0"

  - id: q1.14
    dimension: founder-team
    tier: optional
    type: long-text
    question: "Describe your hiring philosophy and how you've made your most recent senior hire."
    helper-text: "A specific recent example tells us more than abstract principles."
    why-it-matters: |
      How founders hire reveals operational maturity and ability to scale.
      Founders who can articulate process and learnings from real hires
      score higher.
    validation:
      min-chars: 100
      max-chars: 1000
    applies-to:
      stages: [seed, series-a, series-b, later]
      business-models: all
      regions: all
    scoring:
      type: ai-qualitative
      weight: 0.05
      rubric-ref: hiring-philosophy-rubric
    recommendation-trigger:
      low-score: weak-hiring-philosophy
      medium-score: developing-hiring-philosophy
      high-score: null
    version-added: "0.1.0"

  # ─────────────────────────────────────────────────────────────────
  # REGIONAL LAYER: UNITED KINGDOM
  # ─────────────────────────────────────────────────────────────────

  - id: q1.uk1
    dimension: founder-team
    tier: recommended
    type: yes-no-planning
    question: "Have you set up an EMI option scheme for employees?"
    helper-text: "Enterprise Management Incentive is the UK's tax-advantaged share option scheme. Highly attractive to employees and standard from seed stage."
    why-it-matters: |
      UK-based companies that do not have an EMI scheme by seed stage signal
      a lack of attention to employee equity. Sophisticated UK VCs expect
      this to be in place or actively being established as part of the raise.
    options:
      - value: "yes"
        label: "Yes, in place"
      - value: planning
        label: "Planning to set up"
      - value: "no"
        label: "No, not planned"
      - value: not-applicable
        label: "Not applicable (no employees yet)"
    applies-to:
      stages: [seed, series-a, series-b, later]
      business-models: all
      regions: [uk]
    scoring:
      type: categorical
      weight: 0.03
      rubric-ref: emi-scheme-categorical
    recommendation-trigger:
      low-score: no-emi-scheme-uk
      medium-score: emi-scheme-planning-uk
      high-score: null
    version-added: "0.1.0"

  - id: q1.uk2
    dimension: founder-team
    tier: recommended
    type: yes-no-unsure
    question: "Have you obtained SEIS or EIS Advance Assurance from HMRC?"
    helper-text: "Advance Assurance confirms your company qualifies for these schemes. UK angels often expect this before investing."
    why-it-matters: |
      SEIS/EIS Advance Assurance is a near-universal expectation from UK
      angel investors. Companies that have not obtained it are often dropped
      from angel consideration. The cost is low and the process is well-understood.
    options:
      - value: yes-seis
        label: "Yes, SEIS Advance Assurance"
      - value: yes-eis
        label: "Yes, EIS Advance Assurance"
      - value: yes-both
        label: "Yes, both"
      - value: applied-waiting
        label: "Applied, awaiting response"
      - value: "no"
        label: "No, not applied"
      - value: unsure
        label: "Unsure"
      - value: not-applicable
        label: "Not applicable (not UK-incorporated or not raising from UK angels)"
    applies-to:
      stages: [pre-seed, seed]
      business-models: all
      regions: [uk]
    scoring:
      type: categorical
      weight: 0.02
      rubric-ref: seis-eis-categorical
    recommendation-trigger:
      low-score: no-seis-eis-uk
      medium-score: seis-eis-in-progress-uk
      high-score: null
    version-added: "0.1.0"

  # ─────────────────────────────────────────────────────────────────
  # REGIONAL LAYER: FRANCE
  # ─────────────────────────────────────────────────────────────────

  - id: q1.fr1
    dimension: founder-team
    tier: recommended
    type: yes-no-planning
    question: "Have you implemented BSPCE for employees?"
    helper-text: "Bons de Souscription de Parts de Créateur d'Entreprise is the French equivalent of employee stock options with favourable tax treatment."
    why-it-matters: |
      BSPCE is the standard mechanism for employee equity in French startups.
      Its absence at seed and beyond signals either inexperience with the
      French ecosystem or a gap in equity strategy.
    options:
      - value: "yes"
        label: "Yes, in place"
      - value: planning
        label: "Planning to set up"
      - value: "no"
        label: "No, not planned"
      - value: not-applicable
        label: "Not applicable (no employees yet)"
    applies-to:
      stages: [seed, series-a, series-b, later]
      business-models: all
      regions: [fr]
    scoring:
      type: categorical
      weight: 0.03
      rubric-ref: bspce-categorical
    recommendation-trigger:
      low-score: no-bspce-fr
      medium-score: bspce-planning-fr
      high-score: null
    version-added: "0.1.0"

  - id: q1.fr2
    dimension: founder-team
    tier: recommended
    type: yes-no-unsure
    question: "Have you applied for or obtained JEI (Jeune Entreprise Innovante) status?"
    helper-text: "JEI provides significant tax and social charge relief for innovative French startups."
    why-it-matters: |
      JEI status is a substantial financial advantage for eligible French
      startups. Eligible companies that have not applied are leaving money on
      the table, which is a flag for operational rigour.
    options:
      - value: yes-active
        label: "Yes, currently holds JEI status"
      - value: applied
        label: "Applied, awaiting decision"
      - value: planning
        label: "Planning to apply"
      - value: "no"
        label: "No, not applied"
      - value: not-eligible
        label: "Reviewed and not eligible"
      - value: unsure
        label: "Unsure"
    applies-to:
      stages: [pre-seed, seed, series-a]
      business-models: all
      regions: [fr]
    scoring:
      type: categorical
      weight: 0.02
      rubric-ref: jei-categorical
    recommendation-trigger:
      low-score: no-jei-fr
      medium-score: jei-explore-fr
      high-score: null
    version-added: "0.1.0"

  # ─────────────────────────────────────────────────────────────────
  # REGIONAL LAYER: GERMANY
  # ─────────────────────────────────────────────────────────────────

  - id: q1.de1
    dimension: founder-team
    tier: recommended
    type: single-select
    question: "What's your company's legal structure?"
    helper-text: "The right structure depends on stage and capital needs. UG often converts to GmbH as the company grows."
    why-it-matters: |
      Entity structure affects investor preferences. Most German VCs invest
      in GmbHs. UG founders are typically expected to convert before or at
      seed funding.
    options:
      - value: gmbh
        label: "GmbH"
      - value: ug
        label: "UG (Unternehmergesellschaft)"
      - value: ag
        label: "AG (Aktiengesellschaft)"
      - value: gmbh-in-formation
        label: "GmbH in formation"
      - value: other
        label: "Other"
    applies-to:
      stages: all
      business-models: all
      regions: [de]
    scoring:
      type: categorical
      weight: 0.03
      rubric-ref: german-entity-categorical
    recommendation-trigger:
      low-score: entity-conversion-needed-de
      medium-score: null
      high-score: null
    version-added: "0.1.0"

  - id: q1.de2
    dimension: founder-team
    tier: recommended
    type: yes-no-planning
    question: "Have you implemented a VSOP (Virtual Stock Option Plan) for employees?"
    helper-text: "VSOPs are the standard way German startups grant employee equity, given the tax complications of real options."
    why-it-matters: |
      Real options for employees in Germany face dry-income taxation issues,
      so VSOPs (virtual options) are the de facto standard. Their absence
      at seed and beyond signals a gap in talent strategy.
    options:
      - value: "yes"
        label: "Yes, in place"
      - value: planning
        label: "Planning to set up"
      - value: "no"
        label: "No, not planned"
      - value: not-applicable
        label: "Not applicable (no employees yet)"
    applies-to:
      stages: [seed, series-a, series-b, later]
      business-models: all
      regions: [de]
    scoring:
      type: categorical
      weight: 0.02
      rubric-ref: vsop-categorical
    recommendation-trigger:
      low-score: no-vsop-de
      medium-score: vsop-planning-de
      high-score: null
    version-added: "0.1.0"
