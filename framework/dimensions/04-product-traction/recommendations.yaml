# Dimension 4: Product & Traction
# Recommendation templates
#
# Validated against: schema/recommendation.schema.json
#
# Each template is triggered by specific scoring conditions and personalised
# at runtime using the founder's specific data.
#
# Trigger map (must be consistent with questions.yaml):
#   q4.2 low  -> no-early-traction          (critical)
#   q4.3 low  -> low-mrr                    (high)
#   q4.4 low  -> low-growth                 (high)
#   q4.5 low  -> weak-traction-evidence     (critical, free-tier)
#   q4.5 med  -> improvable-traction-evidence (high)
#   q4.6 low  -> no-retention-data            (critical)
#   q4.6 med  -> improvable-retention-metric   (high)
#   q4.7 low  -> no-customer-story            (high)
#   q4.7 med  -> improvable-customer-story     (high)
#   q4.8 low  -> unclear-roadmap              (medium)
#   q4.8 med  -> improvable-product-roadmap    (medium)
#   q4.9 low  -> weak-nrr                     (medium)
#   q4.10 low -> no-product-iteration-signal   (medium)
#   q4.10 med -> improvable-product-iteration  (medium)

dimension: product-traction
version: 0.1.0
templates:

  # -----------------------------------------------------------------
  # Weak traction evidence -- critical
  # -----------------------------------------------------------------
  - id: weak-traction-evidence
    trigger:
      question-ids: [q4.5]
      score-band: low
    priority: critical
    free-tier-visible: true
    diagnostic: |
      Your traction evidence doesn't establish that the product creates
      measurable value for users beyond the founding team. General satisfaction
      claims, early sign-ups without active usage, or internal assertions are
      not traction signals. Traction is the primary thing investors check before
      engaging with anything else; it's the evidence that the product works.
    gap: |
      You need at least one specific, independently verifiable signal: a named
      customer with a documented outcome, a retention figure with a denominator
      and a time period, or a measurable behaviour change that followed product
      adoption. Without one, the product-market fit question is unanswered.
    fix: |
      Identify and document at least one primary traction signal before the
      next investor meeting:

      1. Talk to your most engaged customer or user. Ask what specifically
         changed for them after using the product. Get a number: time saved,
         cost avoided, error rate reduced. One specific measurable change from
         a named customer changes the investor conversation.

      2. Calculate a retention figure, however small the cohort. If 10 users
         signed up in Month 1, how many are still active? Even a 6-week
         retention figure from 10 users is a data point. State the cohort
         explicitly.

      3. Ask your most engaged user whether they would take a reference call
         with an investor. A single willing reference is worth more than any
         aggregate statistic at early stage.

      4. If truly pre-usage, make one person successful before the next
         investor meeting. One real success story, documented and attributable,
         is better evidence than 50 sign-ups.
    evidence: |
      Traction evidence is the most frequently cited gap in early-stage due
      diligence. Founders who can show one specific, verifiable signal, however
      early, are consistently rated as more credible than those with larger
      but unverifiable claims.
    stage-variants:
      pre-seed:
        diagnostic: |
          At pre-seed, weak traction evidence is expected but should still
          include at least one named person who has experienced the product
          and can speak to its value. Waitlist size, social media following, or
          expressed interest without engagement is not traction at any stage.
      series-a:
        diagnostic: |
          At Series A, weak traction evidence is a significant problem. By this
          stage, investors expect quantified retention data, a cohort analysis,
          and several named customers with documented outcomes. Vague signals
          that would be acceptable at pre-seed will fail due diligence at
          Series A.

  # -----------------------------------------------------------------
  # Improvable traction evidence -- high
  # -----------------------------------------------------------------
  - id: improvable-traction-evidence
    trigger:
      question-ids: [q4.5]
      score-band: medium
    priority: high
    free-tier-visible: false
    diagnostic: |
      Your traction signal exists, but it either lacks independent verifiability,
      isn't connected to a measurable customer outcome, or doesn't have enough
      specificity to use in investor conversations.
    gap: |
      Your signal is real but not yet portable enough for due diligence.
      Investors need to be able to confirm what you're describing, either by
      calling the customer or seeing the underlying data, before they can rely
      on it in a partner meeting.
    fix: |
      Two steps will make your current traction signal materially stronger:

      1. Add verifiability. Can the customer be named, or can a screenshot of
         the usage data be shared? A signal an investor can independently
         confirm is worth significantly more than one they take on trust. Ask
         your most engaged customer whether they're comfortable being named in
         investor conversations.

      2. Add a number. Even if you already have a qualitative traction story,
         adding one quantified outcome makes the story significantly more
         portable. Ask the customer what changed for them in measurable terms.

      This week: contact your most engaged customer and ask two questions:
      whether they are comfortable being named in investor conversations,
      and what specifically changed for them in measurable terms. Those
      two answers make the signal you already have both verifiable and
      quantified.
    estimated-impact:
      dimension-score-uplift: 9
      confidence: medium

  # -----------------------------------------------------------------
  # No early traction -- critical
  # -----------------------------------------------------------------
  - id: no-early-traction
    trigger:
      question-ids: [q4.2]
      score-band: low
    priority: critical
    free-tier-visible: true
    diagnostic: |
      Your product has no paying customers, or fewer active users than expected
      for this stage. This is the most direct signal investors assess when
      deciding whether the product is working. Without external users, the
      hypothesis that your product creates value for people beyond the founding
      team remains untested.
    gap: |
      Getting even one person outside the founding team to use the product and
      experience value from it is your most important near-term milestone. The
      first external user is more valuable than a year of internal development:
      they reveal which assumptions are right and which are wrong.
    fix: |
      Identify and make one external person successful with the product before
      the next investor conversation:

      1. List 3-5 specific people by name who have the problem your product
         solves and who you have a relationship with, or can reach this week.
         Warm introductions work; cold outreach to strangers rarely produces
         first users quickly.

      2. Offer them the product for free in exchange for a structured onboarding
         session and weekly feedback for 4 weeks. The goal is not a sale. It is
         a documented, specific experience of value creation.

      3. At the end of 4 weeks, ask what specifically changed for them. If
         nothing changed, you've learned something critical about the product
         that must be addressed before the next external deployment.

      One real user with a documented outcome is the minimum signal required to
      make the traction section of any investor conversation credible.
    evidence: |
      A company that cannot demonstrate external users at the stage it is
      fundraising for is asking investors to underwrite a hypothesis rather than
      a business. Even a single named user with a documented experience materially
      changes how investors assess founding team execution.
    stage-variants:
      pre-seed:
        diagnostic: |
          At pre-seed, having no users is a borderline signal; some pre-seed
          companies are genuinely pre-product. But most investors expect at least
          one external person to have experienced the product, even informally.
          "We haven't shown it to anyone yet" is more concerning than "we have
          5 beta users with mixed reactions."
      seed:
        diagnostic: |
          At seed, no paying customers or very few active users is a significant
          gap. Seed investors expect evidence that the product works for at least
          a small number of real customers. Without this, the seed round is
          funding a hypothesis, not a business.

  # -----------------------------------------------------------------
  # Low growth -- high
  # -----------------------------------------------------------------
  - id: low-growth
    trigger:
      question-ids: [q4.4]
      score-band: low
    priority: high
    free-tier-visible: false
    diagnostic: |
      Your month-over-month growth rate is below what investors expect at this
      stage. Low growth isn't a death sentence, but it requires an explanation:
      whether you're deliberately pausing to fix retention before scaling
      acquisition, you're hitting a market timing issue, or there's a product
      problem that hasn't been resolved yet.
    gap: |
      Growth rate is the key input investors use to extrapolate from your current
      position to exit. A rate below 10% monthly at seed implies roughly 3x
      annual growth; most seed investors target companies with the potential for
      5-10x annual growth from current position.
    fix: |
      Before the next investor conversation, develop a specific explanation for
      your current growth rate and a thesis for how it will change:

      1. Diagnose the constraint. Is your growth limited by the size of the
         addressable pool you can reach with current channels? By conversion
         rate from lead to customer? By customer success capacity that limits
         how many new customers you can onboard? The fix depends entirely on
         which constraint is binding.

      2. State the growth experiment running now: what specific action is
         underway to increase the rate, what are you measuring, and when will
         results be visible?

      3. If growth is intentionally low because you're prioritising retention
         over acquisition, say this explicitly in investor conversations. A
         deliberate pause to improve product quality before scaling is credible;
         unexplained slow growth is not.
    stage-variants:
      pre-seed:
        diagnostic: |
          At pre-seed, slow growth is often expected; the product may be in
          very early testing. The key question is whether the growth rate from
          the first few users to your current number reflects an improving
          trajectory or a plateau. Even a small cohort growing consistently
          is a stronger signal than a larger but static one.
      series-a:
        diagnostic: |
          At Series A, growth rate is the primary underwriting metric. A rate
          below 10% monthly makes it hard to build a credible model to the
          return a fund needs at exit. Series A investors will ask for monthly
          growth data going back 12-18 months and will analyse the trend,
          not just the current rate.

  # -----------------------------------------------------------------
  # No retention data -- critical
  # -----------------------------------------------------------------
  - id: no-retention-data
    trigger:
      question-ids: [q4.6]
      score-band: low
    priority: critical
    free-tier-visible: false
    diagnostic: |
      Your product has paying customers but no defined retention metric, or the
      retention metric you've described is too vague to use in a valuation
      conversation. For a company with revenue, the absence of retention data
      is the single most important gap to close before raising. Growth without
      a retention figure is incomplete; it's the denominator that gives any
      growth rate meaning.
    gap: |
      Without a retention figure, investors cannot model your revenue trajectory
      at scale. Every growth story is conditional on retention: 20% monthly
      growth with 90% annual retention builds a fundamentally different business
      than 20% monthly growth with 50% annual retention. Investors know this
      and will ask.
    fix: |
      Calculate your gross logo retention rate this week. It's a straightforward
      calculation:

      1. List every customer who was active 12 months ago, or at any earlier
         date if 12 months of data isn't available. Use the longest period
         available.

      2. Count how many of those customers are still active today. Divide that
         number by the total from step 1. That's your gross logo retention rate.

      3. If the rate is below 80%, identify the 1-2 customers who churned and
         find out why. The root cause for churn is more valuable than the number
         itself; it reveals whether the problem is product quality, customer
         fit, or something else.

      4. Once you have the figure, track it monthly and include it as a standard
         metric in board and investor updates.

      This data already exists in your customer list and CRM. The only barrier
      is running the calculation.
    estimated-impact:
      dimension-score-uplift: 10
      confidence: high

  # -----------------------------------------------------------------
  # Improvable retention metric -- high
  # -----------------------------------------------------------------
  - id: improvable-retention-metric
    trigger:
      question-ids: [q4.6]
      score-band: medium
    priority: high
    free-tier-visible: false
    diagnostic: |
      You have retention data, but it isn't yet precise enough to use in an
      investor conversation without qualification. The signal exists but is
      incomplete: missing either a time period, a starting denominator, a
      measurement methodology, or a comparison point that gives the number
      meaning.
    gap: |
      A retention figure without a stated denominator and a specific time
      period cannot be independently interpreted. "Most customers renew" and
      "85% logo retention over 12 months from a cohort of 18 customers" are
      both retention statements; only the second survives a partner meeting.
    fix: |
      Three additions make your retention figure investable:

      1. State the denominator. How many customers were in the cohort at the
         start of the period? The number matters: "85% from 3 customers" and
         "85% from 40 customers" carry very different statistical weight and
         investors distinguish between them.

      2. State the time period precisely. A 6-month figure and a 12-month
         figure are not equivalent. Use the longest period available and label
         it: "gross logo retention over the 14 months from [month] to [month]."

      3. State what counts as active. Have you defined "active" in a way that
         excludes customers who contracted but are not using the product? If
         your definition of retention excludes dormant customers, note that
         alongside the figure.

      This week: write your retention figure as a single sentence using this
      format: "[X]% of the [N] customers who were active at [start date] are
      still active today as of [end date]." If you cannot fill in all four
      numbers, identify which one is missing and calculate it.
    estimated-impact:
      dimension-score-uplift: 8
      confidence: medium

  # -----------------------------------------------------------------
  # No customer story -- high
  # -----------------------------------------------------------------
  - id: no-customer-story
    trigger:
      question-ids: [q4.7]
      score-band: low
    priority: high
    free-tier-visible: false
    diagnostic: |
      Your customer story doesn't have enough detail to use as investor reference
      material. A vague story (a company that "liked the product" without a named
      person, a documented outcome, or a specific before-and-after) gives investors
      nothing to verify or follow up on during due diligence.
    gap: |
      The strongest due diligence asset at early stage is a single customer who
      will take a reference call and describe a specific outcome they experienced.
      Without one, an investor's view of your product's value is filtered entirely
      through you, a single source they cannot independently verify.
    fix: |
      Identify your most successful customer or user and document their story
      in three steps:

      1. Schedule a 30-minute call and ask: what were you doing before using
         this product, what specifically changed, and what would you say to
         someone deciding whether to use it? Take notes or record with
         permission.

      2. Extract the three key elements of the story: context (who they are and
         what problem they had), outcome (what specifically changed in measurable
         terms), and conclusion (what they'd say to a peer). Write it in one
         paragraph.

      3. Ask whether they're comfortable being named in investor conversations
         and being contacted by investors who want to follow up. A customer who
         agrees to this is a reference: the most valuable due diligence asset
         available before raising.

      This takes one phone call and one hour of writing. It's the highest
      value-per-hour preparation work available before a fundraise.
    estimated-impact:
      dimension-score-uplift: 8
      confidence: medium

  # -----------------------------------------------------------------
  # Improvable customer story -- high
  # -----------------------------------------------------------------
  - id: improvable-customer-story
    trigger:
      question-ids: [q4.7]
      score-band: medium
    priority: high
    free-tier-visible: false
    diagnostic: |
      Your customer story has the right structure (a named relationship, a
      problem, and a result) but it's missing the element that makes it
      investable: either a measurable outcome, reference availability, or both.
      A story without a number and a willing reference is evidence you hold but
      investors cannot independently verify.
    gap: |
      An investor reading your story should be able to answer two questions:
      what specifically changed for the customer, and can I call them to confirm
      it? If the story doesn't enable both, it functions as a claim rather than
      evidence in a diligence conversation.
    fix: |
      Two additions complete the story:

      1. Quantify the outcome. Ask your customer: "What specifically changed
         for you in measurable terms after using the product?" You are looking
         for a number: hours saved per week, cost reduced per year, error rate
         reduced, or revenue generated. Even a rough estimate with stated
         assumptions is stronger than "significant time savings." One number
         from a named customer changes the investor conversation.

      2. Confirm reference availability. Ask directly: "If an investor asked
         to speak with you about your experience using this product, would you
         be willing to take a 20-minute call?" A customer who says yes is a
         reference. That single commitment is worth more than any additional
         metric you could add to the story.

      This week: contact this customer with both questions. One conversation
      produces either a number, a reference, or both. Either transforms the
      story from a strong claim to a verifiable one.
    estimated-impact:
      dimension-score-uplift: 7
      confidence: medium

  # -----------------------------------------------------------------
  # Low MRR -- high
  # -----------------------------------------------------------------
  - id: low-mrr
    trigger:
      question-ids: [q4.3]
      score-band: low
    priority: high
    free-tier-visible: false
    diagnostic: |
      Your monthly recurring revenue is below what investors typically expect
      at your stated stage and for the size of raise you're contemplating. This
      doesn't make the round impossible, but it requires a stronger narrative on
      the path to the MRR level that makes the round defensible.
    gap: |
      Investors model from your current MRR to exit ARR. A low starting MRR
      makes the implied growth trajectory steeper and the exit timeline longer,
      both of which increase perceived risk and reduce valuation. A specific,
      credible path to 3-5x your current MRR in 12 months is the minimum
      required to make the round fundable at a typical seed valuation.
    fix: |
      Build a bottom-up revenue plan for the next 12 months that you can
      defend in detail:

      1. Start from your current customer list and identify which customers
         could expand their contract: through more seats, new modules, or a
         move to annual billing. Expansion revenue from existing customers
         is the fastest and cheapest revenue to add.

      2. Identify 5-10 specific prospects by name that are reachable in the
         next 90 days. Attach a specific contact, a next action, and a
         realistic close date to each.

      3. Calculate what your MRR would look like if both expansion and the
         named pipeline came through. If the result is 3x or more of current
         MRR within 12 months at a realistic conversion rate, that's your
         plan to present to investors. If it isn't, the question is what
         product or go-to-market change would unlock that trajectory.
    estimated-impact:
      dimension-score-uplift: 0
      confidence: low

  # -----------------------------------------------------------------
  # Unclear roadmap -- medium
  # -----------------------------------------------------------------
  - id: unclear-roadmap
    trigger:
      question-ids: [q4.8]
      score-band: low
    priority: medium
    free-tier-visible: false
    diagnostic: |
      Your product roadmap either lacks specific priorities or isn't connected
      to observable customer evidence. A list of features to build is a backlog,
      not a product strategy. The distinction that matters to investors is
      whether you build what customers need or what you think customers might want.
    gap: |
      A roadmap that can't be traced to specific customer conversations, usage
      data, or sales patterns doesn't demonstrate an evidence-driven development
      process. This becomes more important as you grow: teams that build on
      evidence waste less capital than teams that build on assumption.
    fix: |
      Reframe your roadmap around three specific questions for each item:

      1. Which customers asked for this, or which data point showed it was
         needed? If you can't answer this for a roadmap item, either find the
         evidence or remove the item from your 12-month plan.

      2. What will change for those customers when it ships? State the outcome,
         not the feature: "they'll complete the monthly report in one day
         instead of three" is an outcome; "we'll add a new report type" is a
         feature description.

      3. What will you NOT build in the next 12 months because of this? Naming
         the trade-off demonstrates prioritisation discipline that investors
         find credible. It shows you're resource-constrained and have made a
         deliberate choice.
    estimated-impact:
      dimension-score-uplift: 5
      confidence: medium

  # -----------------------------------------------------------------
  # Improvable product roadmap -- medium
  # -----------------------------------------------------------------
  - id: improvable-product-roadmap
    trigger:
      question-ids: [q4.8]
      score-band: medium
    priority: medium
    free-tier-visible: false
    diagnostic: |
      Your roadmap names priorities and connects some of them to customer
      evidence. The signal gap is completeness: either one or more of the named
      priorities lacks a traceable source, or the roadmap doesn't state what is
      being de-prioritised to make room for what you have chosen. Incomplete
      evidence coverage or absent trade-off reasoning leaves an investor
      uncertain about whether the team builds systematically or selectively.
    gap: |
      A roadmap is most credible when every item can be traced to a specific
      signal and when the excluded items are acknowledged. The trade-off
      statement (what you are not building and why) is often the most revealing
      part of a product strategy conversation. Without it, a priority list is
      indistinguishable from a wish list.
    fix: |
      For each of the two or three named priorities:

      1. Confirm the evidence source is specific. "Multiple customers asked for
         it" is vague. "Three of our six enterprise customers raised this in
         their monthly review call in the past 90 days" is specific. If a
         priority lacks a named source, find one or reconsider whether it
         belongs in the top three.

      2. State what you are not building in the next 12 months that you could
         build. Name at least one item you have consciously de-prioritised and
         the reason: "We are not building [X] yet because [specific reason]."
         This demonstrates that the priority list is a choice, not a default.

      This week: write one sentence of evidence justification for each named
      priority, and one sentence naming the most significant item you have
      de-prioritised and why. The resulting paragraph is your product strategy
      in investor-ready form.
    estimated-impact:
      dimension-score-uplift: 5
      confidence: medium

  # -----------------------------------------------------------------
  # Weak NRR -- medium
  # -----------------------------------------------------------------
  - id: weak-nrr
    trigger:
      question-ids: [q4.9]
      score-band: low
    priority: medium
    free-tier-visible: false
    diagnostic: |
      Your net revenue retention is below 100%, which means your existing
      customer cohort is contracting. This happens either because customers
      are churning faster than they're expanding, or because there's no
      expansion motion at all. For subscription businesses, NRR below 100%
      is one of the most important signals investors track. It determines
      how much growth must come from new customers simply to stay flat.
    gap: |
      NRR below 100% means new customer acquisition must outpace cohort
      contraction just to maintain revenue. This structurally increases the
      capital intensity of growth and the risk that slowing acquisition causes
      revenue to decline. The fix is either reducing churn or adding an
      expansion motion, ideally both.
    fix: |
      Two parallel efforts will move your NRR toward 100%:

      1. Understand churn. For each customer who has churned or reduced their
         contract in the past 12 months, identify the reason. Was it budget,
         product fit, competitive displacement, or something else? One hour of
         exit interviews with churned customers is worth more than any
         quantitative analysis for identifying the root cause.

      2. Identify an expansion motion. Do your current customers have a natural
         path to spend more? More users, more modules, usage-based pricing as
         they scale, or an annual contract at a premium to monthly? If no
         expansion path exists in your current pricing model, that's a
         structural problem to address before the next raise.

      If you have answers to both churn root cause and expansion path, combine
      them into a specific NRR improvement plan with a 12-month target.
    estimated-impact:
      dimension-score-uplift: 7
      confidence: medium

  # -----------------------------------------------------------------
  # No product iteration signal -- medium
  # -----------------------------------------------------------------
  - id: no-product-iteration-signal
    trigger:
      question-ids: [q4.10]
      score-band: low
    priority: medium
    free-tier-visible: false
    diagnostic: |
      Your product development process has no visible iteration loop: ship a
      change, measure what happened, update what you know about user needs.
      Without this, it's hard for investors to distinguish your process from
      one that builds features on intuition and declares success without
      measurement.
    gap: |
      Investors backing a software company are also backing the team's ability
      to improve the product efficiently over time. A team that builds, measures,
      and learns compounds its capital faster than one that builds and ships
      without measurement. That loop isn't visible yet.
    fix: |
      Pick the last significant product change and reconstruct the measurement
      story around it:

      1. What metric were you targeting with that change? Name it specifically:
         daily active users, session completion rate, or a specific customer
         workflow completion rate.

      2. What actually happened to that metric in the 4 weeks after the change
         shipped? Pull the data and compare it to the 4 weeks before.

      3. What did you do differently in the next product cycle based on what
         you found? The learning loop (hypothesis, measurement, update) is the
         iteration signal investors look for.

      Going forward, commit to one metric per product sprint that the change
      is intended to move, and review it 4 weeks after launch. That practice,
      described in investor conversations, is a stronger signal than any
      individual product outcome.
    estimated-impact:
      dimension-score-uplift: 4
      confidence: medium

  # -----------------------------------------------------------------
  # Improvable product iteration -- medium
  # -----------------------------------------------------------------
  - id: improvable-product-iteration
    trigger:
      question-ids: [q4.10]
      score-band: medium
    priority: medium
    free-tier-visible: false
    diagnostic: |
      Your product iteration story describes a change and an outcome, but the
      learning loop is incomplete. A full iteration cycle has three elements:
      a targeted metric, what the data showed after shipping, and a specific
      decision made in the next cycle based on the result. One or more of these
      is missing or vague, which makes the story look like a feature announcement
      rather than an evidence-driven development process.
    gap: |
      The most important element is usually the third: what changed in the next
      cycle as a result of what you measured. A change without an applied
      learning is a data point; a change that demonstrably influenced the next
      cycle is evidence of a systematic process. That distinction matters to
      investors who are backing the team's ability to build efficiently over
      years, not just months.
    fix: |
      Add the missing element to the iteration story:

      1. If the targeted metric is missing: name the specific behaviour or
         outcome the change was intended to move: a completion rate, an
         engagement frequency, a conversion step. "We hoped it would improve
         the product" is not a targeted metric.

      2. If the result data is missing: pull the specific figure for the 4
         weeks after shipping and compare it to the 4 weeks before. Even a
         null result (the metric didn't move) is a useful learning.

      3. If the applied learning is missing: write one sentence describing what
         you built or changed differently in the next product cycle as a direct
         result of this data. That sentence is the evidence that the loop closed.

      This week: write the three-part iteration statement: "We shipped [X]
      targeting [metric]. After 4 weeks, [what happened]. As a result, we
      [specific change in next cycle]." If any part is blank, that is the gap
      to close.
    estimated-impact:
      dimension-score-uplift: 4
      confidence: medium
