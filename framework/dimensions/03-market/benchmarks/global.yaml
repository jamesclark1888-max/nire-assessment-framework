# Dimension 3: Market
# Global benchmarks (default when no regional file applies)
#
# Validated against: schema/benchmark.schema.json
#
# Covers stage-appropriate benchmarks for the four quantitative signals
# in this dimension: TAM size, SAM size, Year-3 SOM target, and
# market growth rate. All monetary figures in USD millions.

region: global
last-reviewed: "2026-06-04"
expires: "2027-06-04"

sources:
  - name: "Atomico State of European Tech 2025"
    url-or-citation: "https://stateofeuropeantech.com"
    year: 2025
  - name: "First Round Capital State of Startups 2024"
    url-or-citation: "https://stateofstartups.firstround.com"
    year: 2024
  - name: "Bessemer Venture Partners State of the Cloud 2025"
    url-or-citation: "https://www.bvp.com/atlas/state-of-the-cloud-2025"
    year: 2025
  - name: "SaaStr Annual Revenue Benchmarks Survey 2024"
    url-or-citation: "https://www.saastr.com/saastr-annual-2024-survey-data"
    year: 2024
  - name: "CB Insights State of Venture 2024"
    url-or-citation: "https://www.cbinsights.com/research/report/venture-trends-2024"
    year: 2024

benchmarks:

  tam-size-pre-seed:
    description: |
      Total addressable market size (USD millions) for companies raising
      pre-seed funding. Reflects minimum TAM thresholds applied by institutional
      pre-seed funds in Europe and the US. Figures represent the total global
      or relevant regional market, not the company's initial target geography.
    unit: USD millions
    applies-to-stage: [pre-seed]
    thresholds:
      exceptional: ">=5000"
      strong: "1000-5000"
      median: "500-1000"
      weak: "100-500"
      concerning: "<100"
    notes: |
      Most European pre-seed funds set an informal minimum TAM of $500M.
      Markets below this produce exit valuations insufficient for a fund-returner
      at typical venture ownership (15-20%). Markets above $1B are significantly
      more fundable. Markets above $5B are rarely questioned on size alone.

  tam-size-seed:
    description: |
      Total addressable market size (USD millions) for companies raising
      seed funding. Seed investors typically require a larger credible TAM
      than pre-seed because they are modelling a 5-7 year growth trajectory
      to exit.
    unit: USD millions
    applies-to-stage: [seed]
    thresholds:
      exceptional: ">=10000"
      strong: "2000-10000"
      median: "500-2000"
      weak: "200-500"
      concerning: "<200"
    notes: |
      By seed stage, market narrative needs to be more defensible. Seed funds
      target companies that could become $100M-$500M revenue businesses; this
      typically requires a TAM of at least $1B at realistic penetration rates.
      Smaller TAMs require a compelling market expansion or adjacent-market story.

  tam-size-series-a:
    description: |
      Total addressable market size (USD millions) for companies raising
      Series A. Series A investors model the path to a $500M-$2B exit,
      requiring credible TAM well above that threshold.
    unit: USD millions
    applies-to-stage: [series-a]
    thresholds:
      exceptional: ">=20000"
      strong: "5000-20000"
      median: "1000-5000"
      weak: "500-1000"
      concerning: "<500"
    notes: |
      Series A investors routinely reject companies on market size grounds when
      TAM is below $1B without a credible expansion narrative. The TAM should
      also be supported by direct customer data by this stage — at Series A,
      analyst-report-only TAMs are heavily scrutinised.

  sam-size-global:
    description: |
      Serviceable addressable market (USD millions). Represents the portion
      of TAM realistically addressable with the current product, business model,
      and go-to-market motion. A credible SAM/TAM ratio typically falls
      between 5% and 30%. This benchmark covers all stages.
    unit: USD millions
    applies-to-stage: [pre-seed, seed, series-a]
    thresholds:
      exceptional: ">=500"
      strong: "100-500"
      median: "20-100"
      weak: "5-20"
      concerning: "<5"
    notes: |
      SAM is the primary underwriting number for near-term revenue projections.
      A SAM below $5M suggests either a very narrow initial beachhead
      (acceptable as a wedge strategy if clearly articulated) or an
      under-scoped go-to-market. A SAM equal to or exceeding TAM is a
      credibility flag that prompts diligence scrutiny on methodology.

  som-target-pre-seed:
    description: |
      Realistic Year-3 revenue target (USD millions) for pre-seed companies.
      Represents what a well-run pre-seed company should be able to achieve
      in Annual Recurring Revenue or annual revenue by Year 3 of operation.
    unit: USD millions
    applies-to-stage: [pre-seed]
    thresholds:
      exceptional: ">=10"
      strong: "3-10"
      median: "1-3"
      weak: "0.25-1"
      concerning: "<0.25"
    notes: |
      Pre-seed companies projecting <$250K in Year-3 revenue are either
      modelling too conservatively or have identified a market too small
      for institutional investment. Companies projecting >$10M at pre-seed
      without a specific structural basis (existing LOIs, regulatory mandates,
      unique distribution) will face credibility challenges in due diligence.

  som-target-seed:
    description: |
      Realistic Year-3 revenue target (USD millions) for seed-stage companies.
      Seed investors typically expect more grounded projections based on
      early product and go-to-market data.
    unit: USD millions
    applies-to-stage: [seed]
    thresholds:
      exceptional: ">=30"
      strong: "10-30"
      median: "3-10"
      weak: "1-3"
      concerning: "<1"
    notes: |
      By seed, founders should have enough pipeline and conversion data to
      build a credible bottom-up model. Year-3 projections that are not
      grounded in early sales metrics (early ACV, sales cycle, early churn)
      score lower than those connected to actual observed data.

  som-target-series-a:
    description: |
      Realistic Year-3 revenue target (USD millions) for Series A companies.
      At Series A, Year-3 targets should be defensible from existing ARR
      growth rates, quota-carrying headcount plans, and observed churn.
    unit: USD millions
    applies-to-stage: [series-a]
    thresholds:
      exceptional: ">=100"
      strong: "30-100"
      median: "10-30"
      weak: "3-10"
      concerning: "<3"
    notes: |
      Series A targets below $3M in Year-3 revenue imply growth rates
      inconsistent with institutional venture expectations. Above $100M
      requires either exceptional current growth data or a specific event-driven
      catalyst (regulatory mandate, exclusive distribution) to be credible.

  market-growth-rate-global:
    description: |
      Annual compound growth rate (CAGR) of the target market. Based on
      analysis of sectors where venture-backed companies have achieved
      significant returns. Applies across all stages — market growth rate
      is relevant regardless of company stage.
    unit: percent per year (CAGR)
    applies-to-stage: [pre-seed, seed, series-a]
    thresholds:
      exceptional: ">=30"
      strong: "15-30"
      median: "8-15"
      weak: "3-8"
      concerning: "<=2"
    notes: |
      Markets growing at >20% CAGR are disproportionately represented in
      venture portfolios. At <5% CAGR, investors require a displacement thesis
      — the company must grow by taking share from incumbents rather than
      by riding market tailwinds. Declining markets (negative CAGR) require
      an explicit obsolescence or regulatory-transition argument to attract
      institutional capital. These thresholds reflect global market norms;
      specific regulated sectors (healthcare, financial services) may accept
      lower CAGR due to high barriers to entry providing structural defence.
