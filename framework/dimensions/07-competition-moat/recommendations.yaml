# Dimension 7: Competition & Moat
# Recommendation templates
#
# Validated against: schema/recommendation.schema.json
#
# Each template is triggered by specific scoring conditions and personalised
# at runtime using the founder's specific data.
#
# Trigger map (must be consistent with questions.yaml):
#   q7.1 low  -> weak-competitive-awareness      (critical, free-tier)
#   q7.2 low  -> weak-differentiation            (critical, free-tier)
#   q7.2 med  -> improvable-differentiation      (high)
#   q7.4 low  -> weak-incumbent-response          (high)
#   q7.4 med  -> partial-incumbent-response       (medium)
#   q7.5 low  -> no-moat-evidence                 (critical, free-tier)
#   q7.5 med  -> thin-moat-evidence               (high)
#   q7.6 low  -> no-moat-compounding              (high)
#   q7.6 med  -> thin-moat-compounding            (medium)
#   q7.7 low  -> undefined-switching-costs        (medium)
#   q7.7 med  -> thin-switching-costs             (medium)
#   q7.8 low  -> network-effects-undefined        (medium)
#   q7.9 low  -> no-competitive-deal-evidence     (medium)
#   q7.9 med  -> partial-competitive-deal         (medium)
#   q7.10 low -> limited-ip-barriers              (medium)

dimension: competition-moat
version: 0.1.0
templates:

  # -----------------------------------------------------------------
  # Weak competitive awareness -- critical
  # -----------------------------------------------------------------
  - id: weak-competitive-awareness
    trigger:
      question-ids: [q7.1]
      score-band: low
    priority: critical
    free-tier-visible: true
    diagnostic: |
      Your competitive landscape mapping lacks the specificity investors expect.
      Naming no competitors, claiming no competition exists, or covering only
      direct competitors without addressing indirect substitutes signals incomplete
      market research. In investor meetings, "who are your competitors?" is asked
      in the first five minutes. An answer that names no specific companies, or
      claims no competition exists, ends the productive conversation before it
      starts.
    gap: |
      A credible competitive map names direct competitors with product
      characterisation, acknowledges the indirect substitutes buyers consider
      (manual processes, adjacent software, consultants), and addresses the
      "do nothing" baseline, which is often the hardest to displace. Without
      all three categories, the map is incomplete and the investor's next
      question is "have you actually spoken to customers who evaluated
      alternatives?"
    fix: |
      Build a complete competitive map in three sections:

      1. Direct competitors: name 2-4 companies offering a similar product to
         the same buyer. For each, characterise their approach in one sentence,
         their primary strength from a buyer's perspective, and the type of
         customer who chooses them.

      2. Indirect substitutes: name what a buyer does today if they don't buy
         any purpose-built solution: a spreadsheet, a consultant, a manual
         process, or an adjacent product they already own. This is often the
         most important competitor category because it represents the status quo.

      3. Do nothing: describe what a customer's situation looks like if they
         defer the decision entirely. This reveals the urgency of the problem
         and the cost of inaction, which directly affects sales cycle length.

      Completing this exercise requires direct customer conversations if those
      haven't happened yet, which is its own high-value activity.
    evidence: |
      Founders who map their competitive landscape precisely demonstrate customer
      knowledge, market intelligence, and strategic self-awareness. Conversely,
      "we have no competition" is one of the most consistently cited warning signs
      in investor partner meeting notes.
    stage-variants:
      pre-seed:
        diagnostic: |
          At pre-seed, some competitive ambiguity is expected; the market may not
          have fully formed. But even at this stage, investors expect named
          alternatives: who solves this problem today and why is it inadequate?
          Founders who can articulate this clearly demonstrate enough customer
          knowledge to build with conviction.
      series-a:
        diagnostic: |
          At Series A, a partial competitive map is a significant diligence risk.
          With 12-18 months of customer-facing activity, you should have encountered
          direct competitors in sales processes and developed a detailed view of the
          competitive dynamics. An incomplete map at this stage signals a gap in
          market intelligence that will surface in partner meetings.

  # -----------------------------------------------------------------
  # Weak differentiation -- critical
  # -----------------------------------------------------------------
  - id: weak-differentiation
    trigger:
      question-ids: [q7.2]
      score-band: low
    priority: critical
    free-tier-visible: true
    diagnostic: |
      Your differentiation claim isn't specific enough to test, or it isn't clearly
      distinct from what competitors already offer. "We are better" and "we are more
      user-friendly" are not differentiation; they are claims every founder makes
      about their own product. Investors have heard every general quality claim and
      discount them entirely. What they look for is the specific, verifiable,
      structural reason a customer chooses one product over another.
    gap: |
      A differentiation that can't be stated in specific, testable terms can't
      survive due diligence. Investors will ask your existing and potential customers
      exactly this question ("why would you choose this product over the
      alternatives?") and if the answer matches your general claims, it reduces
      conviction rather than increasing it.
    fix: |
      Develop a specific differentiation statement using this process:

      1. Name the comparison: identify the one or two alternatives a buyer most
         seriously considers before choosing your product. Make the differentiation
         relative to a named alternative, not to the market in general.

      2. State the specific outcome difference: what does a customer achieve with
         your product that they cannot reliably achieve with the named alternative?
         Be as specific as possible: time saved, cost reduced, risk avoided, or
         outcome produced. "40% faster" or "£20k per year cheaper" is specific.
         "More efficient" is not.

      3. Find a reference: identify a customer who made this specific comparison
         and chose your product, and what they said about why. A paraphrase from
         a real customer conversation, even one sentence, is worth more than any
         amount of internal positioning work.

      4. Test the claim: ask your last 3 customers "why did you ultimately choose
         us over the alternatives you considered?" Their answers are the real
         differentiation, not internal positioning documents.
    evidence: |
      The differentiation question is a reliable proxy for discovery depth. Founders
      who have had enough customer conversations to understand exactly why customers
      choose them over specific alternatives can answer it precisely. Founders who
      have not cannot, and investors know the difference.
    stage-variants:
      pre-seed:
        fix: |
          At pre-seed, it is acceptable for differentiation to be partially
          hypothesis; there may not be many customers yet to validate it. State
          the hypothesis specifically, name the assumption behind it, and describe
          the evidence being collected to test it. "We believe our advantage is X,
          and we are testing this with our first 3 pilot customers" is a credible
          pre-seed answer. "We are better" is not, at any stage.
      series-a:
        fix: |
          At Series A, differentiation should be validated by customer behaviour:
          renewal rates, win rates, customer quotes from competitive evaluations.
          The hypothesis-stage framing is no longer credible; by now there should
          be enough customer data to characterise differentiation empirically.
          Reframe the answer around what customers have said and what the sales
          data shows.

  # -----------------------------------------------------------------
  # Improvable differentiation -- high
  # -----------------------------------------------------------------
  - id: improvable-differentiation
    trigger:
      question-ids: [q7.2]
      score-band: medium
    priority: high
    free-tier-visible: false
    diagnostic: |
      Your differentiation is named, but it either lacks a specific customer
      outcome or isn't clearly connected to a structural reason why competitors
      can't replicate it. The claim is a good starting point but would not
      survive a detailed due diligence conversation without strengthening.
    gap: |
      Your differentiation needs either more specificity (a quantified outcome
      rather than a directional claim) or a structural backing (a reason why the
      advantage persists over time rather than being a temporary lead).
    fix: |
      Add two elements to your current differentiation statement:

      1. Quantification: can the customer outcome be expressed in a number? Even
         a rough estimate with stated assumptions is stronger than a qualitative
         direction. "Approximately 60% faster based on the average time our first
         6 customers reported" is quantified. "Much faster" is not.

      2. Structural backing: why is the advantage durable? Is it a proprietary
         process that would take 12 months to copy, a data asset that grows with
         each customer, or a domain expertise embedded in the product that a
         generalist competitor can't quickly replicate? One sentence on why this
         advantage persists makes the claim structurally credible rather than
         just currently true.

      This week: ask your two or three most recent customers what changed
      for them in measurable terms when they started using your product.
      Write one sentence using a rough average of their answers. That
      sentence is your differentiation claim, grounded in customer evidence
      rather than internal positioning.
    estimated-impact:
      dimension-score-uplift: 8
      confidence: medium

  # -----------------------------------------------------------------
  # Weak incumbent response -- high
  # -----------------------------------------------------------------
  - id: weak-incumbent-response
    trigger:
      question-ids: [q7.4]
      score-band: low
    priority: high
    free-tier-visible: false
    diagnostic: |
      Your response to the incumbent threat relies primarily on execution speed
      without a structural argument, doesn't name the specific incumbent most likely
      to move, or doesn't articulate what you would do proactively if the scenario
      occurred. Investors treat this question as a strategic thinking test; the
      quality of the answer reveals whether you have a realistic model of competitive
      dynamics or are depending on obscurity as a strategy.
    gap: |
      "We would move faster" is a temporary advantage that incumbents with
      significant resources can overcome by hiring and acquiring. A structural
      argument identifies something about the incumbent's incentives, architecture,
      or customer relationships that makes it genuinely difficult for them to
      compete effectively, regardless of resource advantage.
    fix: |
      Work through the incumbent threat by answering three specific questions
      about the most likely large-company mover:

      1. Which specific company is the most likely to enter? Name them. Consider
         their existing customer relationships in this market, their stated
         strategic priorities, and their acquisition history. Naming the specific
         company forces honest analysis of their actual capabilities and constraints.

      2. What structural reason would limit their effectiveness? Consider: channel
         conflict (would shipping a competing product damage their existing partner
         or revenue relationships?), business model incompatibility (do they make
         money in a way that conflicts with this model?), organisational culture
         (can a large company build the specialised depth that defines this niche?),
         or customer relationship gaps (do they lack the relationships in the
         specific buyer role or segment being served?).

      3. What would your first 90 days look like? Name the specific customers to
         lock in with longer contracts, the product features to accelerate, or the
         partnerships to sign to deepen position before the incumbent gains traction.

      The structural argument is the hardest part and the highest-value output of
      this exercise.
    stage-variants:
      pre-seed:
        diagnostic: |
          At pre-seed, it is reasonable for your structural argument to be partially
          hypothetical; defensibility may not yet be proven. The quality signal at
          this stage is whether you have thought through the structural constraints
          on potential incumbents, not whether you have demonstrated them empirically.
      series-a:
        diagnostic: |
          At Series A, a weak incumbent response is a significant diligence risk.
          By now there should be pressure from larger players or clear visibility
          into who will move. Your structural argument should be grounded in observed
          market dynamics: channel conflicts already seen, customers who compared
          your product to incumbent solutions, or strategic announcements from
          competitors that reveal their constraints.

  # -----------------------------------------------------------------
  # Partial incumbent response -- medium
  # -----------------------------------------------------------------
  - id: partial-incumbent-response
    trigger:
      question-ids: [q7.4]
      score-band: medium
    priority: medium
    free-tier-visible: false
    diagnostic: |
      You have named the most likely incumbent mover and offered a structural
      reason why you would survive. The argument is incomplete in one of two
      ways: either the structural constraint on the incumbent is described but
      not specific enough to survive pushback ("they are too slow" rather than
      "they have a documented channel conflict with their partner network"), or
      you have not described what you would do in the first 90 days if the
      scenario occurred.
    gap: |
      Naming an incumbent and asserting a structural reason is the floor. The
      ceiling is naming the specific mechanism that limits their effectiveness
      and describing the concrete actions you would take before they gain
      traction. The 90-day response is what distinguishes "we would survive"
      from "we have a plan."
    fix: |
      Sharpen the argument with two additions:

      1. Make the structural constraint specific. Generic constraints ("large
         companies move slowly") are not credible without a named mechanism.
         Pick the one that applies most directly to the named incumbent: channel
         conflict (naming their partner relationships that would be threatened),
         business model incompatibility (explaining exactly which of their revenue
         lines the competing product would cannibalise), or customer relationship
         gap (specifying which buyer role or segment they do not currently serve
         and why). One specific mechanism beats three generic ones.

      2. Add the 90-day response. If the scenario occurred tomorrow, what are
         the first three things you would do? Name specific customers to lock
         in with longer contracts, specific product features to accelerate, or
         specific partnerships to close. This is not a contingency plan; it is
         a pre-prepared list of moves that shows the competitive analysis has
         been internalised.

      This week: write the 90-day response as a list of three named actions
      with specific owners and timelines. The act of writing it will also
      reveal whether the structural constraint argument holds.
    estimated-impact:
      dimension-score-uplift: 6
      confidence: medium

  # -----------------------------------------------------------------
  # No moat evidence -- critical
  # -----------------------------------------------------------------
  - id: no-moat-evidence
    trigger:
      question-ids: [q7.5]
      score-band: low
    priority: critical
    free-tier-visible: true
    diagnostic: |
      Your moat claim has no observable present-tense evidence, or the evidence
      provided consists of logical arguments rather than observable signals. The
      distinction matters: a well-reasoned argument for why a moat should exist
      is a business model argument. An observable signal that the moat already
      operates is evidence. Investors fund the latter; they discount the former,
      particularly at seed and beyond.
    gap: |
      Without at least one concrete, present-tense signal (a retention rate figure,
      a named customer who chose your product after evaluating a competitor, a data
      metric growing with usage) your moat claim is assertion. Assertion is the
      lowest-value input in a due diligence process; evidence is the highest.
      This gap weakens the entire D7 dimension.
    fix: |
      Identify and document at least one primary moat signal using one of
      these approaches:

      1. Retention data: pull your 12-month gross logo or gross revenue retention
         rate. Even a small customer base produces a retention figure. A rate above
         85% is a meaningful signal; above 90% is strong. If operating for less than
         12 months, use whatever period is available and state the cohort explicitly.

      2. Competitive win evidence: review the last 6 deals where the prospect
         evaluated alternatives. What was your win rate? Can you name the competitor
         and what the customer said drove their decision? A 5-of-6 win rate against
         a named competitor, with a customer quote, is compelling evidence.

      3. Customer testimony on switching cost: contact your 3 most embedded
         customers and ask "if you needed to move to a different solution, what
         would the process look like?" Document their answers. A candid description
         of migration complexity from a customer is the most credible switching cost
         evidence available.

      4. Data asymmetry proxy: if your moat is a growing data asset, measure a
         proxy for its current state: the number of events, decisions, or cases
         processed, and how this compares to what a new entrant would start with.
         Even a rough comparison is evidence.

      Document whatever you find and use it in the next investor conversation.
      A single specific, attributed signal changes the conversation from assertion
      to evidence.
    evidence: |
      The absence of moat evidence is the single most common gap found in
      seed-stage pitches by experienced investors. Founders can argue that moats
      are hard to demonstrate at early stage, but those who find a way to show even
      one concrete signal are consistently rated as more investable than those who
      rely on logical arguments alone.
    stage-variants:
      pre-seed:
        diagnostic: |
          At pre-seed, thin moat evidence is expected; there may be very few
          customers and a short operating history. The minimum bar is one concrete
          signal, even qualitative: a customer statement about switching cost, a
          named prospect who evaluated three alternatives and chose your product,
          or a data metric growing with usage. The standard is low; the bar is
          just above zero.
      series-a:
        diagnostic: |
          At Series A, the absence of moat evidence is a significant problem.
          With 12-18 months of customer-facing activity and a product in use,
          there should be observable signals of competitive stickiness. Series A
          investors explicitly underwrite defensibility at this stage; an inability
          to cite current retention data, win rates, or customer testimony about
          switching cost will generate hard questions in partner meetings.

  # -----------------------------------------------------------------
  # Thin moat evidence -- high
  # -----------------------------------------------------------------
  - id: thin-moat-evidence
    trigger:
      question-ids: [q7.5]
      score-band: medium
    priority: high
    free-tier-visible: false
    diagnostic: |
      Your moat evidence exists, but it's concentrated in a single signal type
      or is qualitative without quantification. A single signal is a finding;
      multiple independent signals pointing to the same conclusion are a pattern.
      Patterns are far more credible to investors because they're harder to
      attribute to noise, a single unusual customer, or selective presentation.
    gap: |
      A second independent moat signal, particularly of a different type from
      your current strongest signal, would meaningfully strengthen your competitive
      narrative. Investors perform a mental triangulation when assessing moat
      claims; a second corroborating signal closes a significant credibility gap.
    fix: |
      Add one additional moat signal of a different type from your current
      strongest evidence. If your primary signal is qualitative (a customer quote
      about switching cost), add a quantitative signal (retention rate or win rate
      data). If your primary signal is product usage data, add a direct competitive
      comparison (a named competitive evaluation that you won). The combination of
      a qualitative and a quantitative signal from two different sources is
      significantly more credible than depth in one type.

      This week: calculate your customer retention rate from your customer
      list if you have not yet done so, or document the named competitor
      and deciding factor from your last three competitive sales situations.
      Either produces the second independent signal needed to move from a
      single finding to a pattern.
    estimated-impact:
      dimension-score-uplift: 8
      confidence: medium

  # -----------------------------------------------------------------
  # No moat compounding -- high
  # -----------------------------------------------------------------
  - id: no-moat-compounding
    trigger:
      question-ids: [q7.6]
      score-band: low
    priority: high
    free-tier-visible: false
    diagnostic: |
      Your moat description doesn't explain how the advantage gets stronger over
      time. It states that the moat compounds but doesn't name the mechanism.
      Static moats can be overcome by a well-capitalised competitor willing to pay
      the entry cost. Only compounding moats become more expensive to replicate
      as you scale.
    gap: |
      A moat that peaks at your current competitive position has a finite useful
      life. Investors model your competitive position at exit, not at investment.
      A moat as strong in 5 years as it is today is worth less than one that is
      significantly stronger.
    fix: |
      Identify the specific unit of growth that drives moat compounding and
      describe the three-part mechanism:

      1. The growth unit: what accumulates as your company scales? Customers,
         transactions, data points, integrations, regulatory certifications,
         partner relationships? Name the specific unit.

      2. The accumulation effect: what does the accumulated unit create? A better
         model, deeper workflow lock-in, a larger network, a higher barrier to
         regulatory entry? Name what builds up.

      3. The barrier increase: why does the accumulation make your company harder
         to replicate? What would a competitor need to invest or wait for to achieve
         the same accumulated position, and how does that cost or time increase with
         scale?

      A moat argument that passes this three-part test is a compounding moat
      argument. One that fails it is a static advantage claim dressed in
      compounding language.
    stage-variants:
      pre-seed:
        fix: |
          At pre-seed, the compounding mechanism can be described as a design
          intention rather than a demonstrated dynamic. State what you're building
          toward: "We are designing our data architecture so that each customer's
          usage improves model performance for all customers. We are at 8 customers
          now; we expect the effect to become material above 50."
      series-a:
        fix: |
          At Series A, early evidence of compounding should be demonstrable, not
          just described as a design intention. How does your product today compare
          to the product you shipped 12 months ago? What does that difference mean
          for a new entrant who is starting where you were 12 months ago?

  # -----------------------------------------------------------------
  # Thin moat compounding -- medium
  # -----------------------------------------------------------------
  - id: thin-moat-compounding
    trigger:
      question-ids: [q7.6]
      score-band: medium
    priority: medium
    free-tier-visible: false
    diagnostic: |
      Your compounding moat argument names a growth unit (the thing that
      accumulates as you scale) but doesn't yet complete the full mechanism.
      Investors need to see the link between accumulation and increasing
      replication cost. Without that link, the argument describes growth, not
      compounding.
    gap: |
      A moat that grows because the company grows is not automatically
      compounding. Compounding requires a specific mechanism: the accumulated
      asset must make the product meaningfully better for existing customers,
      or make entry materially more expensive for a new competitor, or both.
      The causal chain needs to be stated, not implied.
    fix: |
      Complete the three-part mechanism:

      1. Name the growth unit. What accumulates with scale? Be specific: "each
         customer's usage generates [type of data]", "each integration adds [Y]
         to the workflow dependency graph", "each certified implementation adds
         [Z] to the reference base." The unit should be nameable and countable.

      2. Name what the accumulated unit creates. What does having 100 units of
         the growth thing produce that 10 units does not? A measurably better
         model, a deeper integration web, a richer benchmark dataset? The
         accumulation effect must translate into something a customer experiences.

      3. Name the replication cost. Given the accumulation described, how long
         or how much capital would it take a well-funded new entrant to reach
         the same position? "12 months and 50 enterprise customers" is specific.
         "A long time" is not.

      This week: write one sentence for each of the three parts. If any sentence
      requires more than one sentence to explain, the mechanism is not yet
      specific enough.
    estimated-impact:
      dimension-score-uplift: 5
      confidence: medium

  # -----------------------------------------------------------------
  # Undefined switching costs -- medium
  # -----------------------------------------------------------------
  - id: undefined-switching-costs
    trigger:
      question-ids: [q7.7]
      score-band: low
    priority: medium
    free-tier-visible: false
    diagnostic: |
      Your switching costs aren't articulated, or the switching costs described
      are generic and unquantified. Customer stickiness that can't be described
      in operational terms (how long migration would take, what data or
      configuration would be lost, what retraining is required, what financial
      penalty is embedded in the contract) is difficult for investors to underwrite
      as a genuine moat element.
    gap: |
      Switching cost arguments are most valuable to investors when described
      operationally and, ideally, quantified. An operational description forces
      engagement with the actual customer experience of leaving, rather than an
      abstract claim that customers don't want to.
    fix: |
      Work through the switching cost argument from the customer's perspective
      by answering: what would actually happen if one of your largest customers
      decided to switch to a competitor tomorrow?

      1. Data migration: what data is in your system and in what format? Can it
         be exported in a form the competitor's system can ingest? If not, what
         is lost or what manual effort is required?

      2. Configuration and customisation: what workflows, rules, templates, or
         customisations has the customer built? Can those be replicated elsewhere
         or would they need to be rebuilt from scratch?

      3. Retraining: how many of the customer's team members use your product?
         What would it cost in time to retrain them on a new system?

      4. Contract and financial: are there contractual penalties for early
         termination, minimum commitments, or prepaid licences that create a
         financial switching cost?

      Answering these four questions for one representative customer gives a
      concrete, defensible switching cost argument.
    estimated-impact:
      dimension-score-uplift: 5
      confidence: medium

  # -----------------------------------------------------------------
  # Thin switching costs -- medium
  # -----------------------------------------------------------------
  - id: thin-switching-costs
    trigger:
      question-ids: [q7.7]
      score-band: medium
    priority: medium
    free-tier-visible: false
    diagnostic: |
      You have described switching costs in general terms, but the argument
      isn't yet operational. Investors test switching cost claims by asking
      "what would actually happen if your largest customer tried to leave
      tomorrow?" If the answer is a category description rather than a
      walk-through of a specific customer's migration experience, the claim
      is soft.
    gap: |
      Switching cost arguments are most credible when described from the
      customer's perspective, not the vendor's. The friction should be
      specific to one representative customer: their data footprint, their
      configuration investment, their team's dependency on your workflows.
      Generic descriptions ("we are deeply embedded") are claims; a specific
      migration scenario is evidence.
    fix: |
      Walk through one representative customer's switching scenario:

      1. Data: what is in your system for this customer? How much of it, in
         what format, and what would be required to export and re-import it into
         a competitor system? If the answer involves manual re-entry or format
         conversion, name how long that would realistically take.

      2. Configuration: what has the customer built inside your product?
         Templates, rules, workflows, custom integrations, historical reports?
         Items that cannot be exported and must be rebuilt represent a hard
         switching cost. Name them specifically.

      3. Retraining: how many of their team use your product daily? Even a
         rough estimate of retraining days per person multiplied by headcount
         gives a quantified cost that is far more credible than "our product
         is embedded."

      This week: answer all three questions for your largest current customer.
      Write the answers down. The resulting paragraph is your switching cost
      argument in investor-ready form.
    estimated-impact:
      dimension-score-uplift: 5
      confidence: medium

  # -----------------------------------------------------------------
  # Network effects undefined -- medium
  # -----------------------------------------------------------------
  - id: network-effects-undefined
    trigger:
      question-ids: [q7.8]
      score-band: low
    priority: medium
    free-tier-visible: false
    diagnostic: |
      Either network effects or data dynamics don't apply to your business model
      and that hasn't been addressed directly, or they've been claimed without a
      mechanism that holds up to structural analysis. Both are problematic: the
      former leaves a recommended question unanswered; the latter creates
      credibility risk if the claim is examined by an experienced investor.
    gap: |
      The two most common failure modes here are: a genuine network effect or data
      flywheel that exists but hasn't been described precisely enough to be credible,
      and a spurious claim of network effects in a business that operates more like
      a traditional SaaS product. Both require different responses.
    fix: |
      First, determine honestly which category applies:

      1. If network effects or data dynamics genuinely apply: work through the
         mechanism precisely. Name the type (same-side, cross-side, data network).
         Describe the unit of value creation (each additional user, each additional
         transaction, each additional data point). State what accumulates and how
         it benefits existing users specifically, not users generally. If a critical
         mass threshold can be described above which the effect becomes
         self-sustaining, include it.

      2. If they don't genuinely apply: state this directly and describe what
         alternative moat dynamics your business relies on instead. "Network effects
         are not a primary moat for us; our defensibility comes from switching costs
         embedded in workflow integration and proprietary customer data that cannot
         be exported" is a credible, self-aware answer that scores higher than an
         unconvincing claim of network effects.

      Accuracy and self-awareness are valued more than aspirational moat claims
      in this section.
    estimated-impact:
      dimension-score-uplift: 4
      confidence: low

  # -----------------------------------------------------------------
  # No competitive deal evidence -- medium
  # -----------------------------------------------------------------
  - id: no-competitive-deal-evidence
    trigger:
      question-ids: [q7.9]
      score-band: low
    priority: medium
    free-tier-visible: false
    diagnostic: |
      Your competitive narrative has no specific situation with a named competitor,
      or the situation described lacks either a root cause analysis or an applied
      lesson. Competitive deal evidence is the most operationally grounded signal
      of how differentiation performs in practice. Without a named situation, your
      competitive narrative remains at the level of assertion rather than
      demonstrated reality.
    gap: |
      A single well-documented competitive situation (win or loss) with a named
      competitor and an identified root cause is worth more than a general statement
      about your competitive win rate. Specificity is the signal here; the win rate
      itself is secondary to the depth of analysis.
    fix: |
      Document one competitive situation from memory using this structure:

      1. The context: company size and type, use case, what stage of evaluation
         was reached.

      2. The named competitor: who else were they evaluating? Use the real name.

      3. The outcome: did you win or lose? State it directly.

      4. The root cause: what was the specific deciding factor? Not "we were better
         overall" but "the compliance officer required ISO 27001 and the competitor
         did not have it" or "the CFO chose the incumbent because the procurement
         team had an existing relationship and didn't want to take the risk of a
         startup for a business-critical system."

      5. The lesson applied: has anything changed in your product, sales motion,
         pricing, or positioning as a result of this situation?

      If there genuinely hasn't been a direct competitive situation yet, describe
      the closest analogue: a prospect who compared your approach to an existing
      solution, even informally.
    estimated-impact:
      dimension-score-uplift: 4
      confidence: medium

  # -----------------------------------------------------------------
  # Partial competitive deal -- medium
  # -----------------------------------------------------------------
  - id: partial-competitive-deal
    trigger:
      question-ids: [q7.9]
      score-band: medium
    priority: medium
    free-tier-visible: false
    diagnostic: |
      You have described a competitive situation with a named competitor and a
      stated outcome. The signal is incomplete because either the root cause is
      missing (you know who won but not specifically why) or the applied lesson
      is absent (the outcome hasn't changed how you compete). Both gaps matter:
      root cause reveals what actually drives decisions in your market, and the
      applied lesson signals whether competitive intelligence feeds back into
      the business.
    gap: |
      A competitive result without a root cause is a data point. A root cause
      without an applied lesson is a missed learning. The combination of all
      three (outcome, root cause, and subsequent change) is what investors read
      as evidence of a team running an evidence-based competitive process rather
      than reacting to individual situations.
    fix: |
      Add the missing elements to the situation you described:

      1. If the root cause is missing: go back to the source. For a lost deal,
         contact the prospect and ask directly what drove the final decision.
         "We went with [competitor] because [specific reason]" is the input you
         need. For a won deal, ask the customer what tipped the decision in your
         favour. Even a reply two months later is useful.

      2. If the applied lesson is missing: write one specific thing that changed
         in your product, pricing, sales process, or targeting as a result of
         the situation. "We added a security questionnaire after three losses on
         procurement timelines" is a lesson applied. "We learned we need to
         improve on X" is not.

      This week: write the full five-element version of the story: context,
      named competitor, outcome, root cause, and lesson applied. If any element
      is genuinely unavailable, label it as such. That honesty itself scores
      better than a vague claim.
    estimated-impact:
      dimension-score-uplift: 4
      confidence: medium

  # -----------------------------------------------------------------
  # Limited IP barriers -- medium
  # -----------------------------------------------------------------
  - id: limited-ip-barriers
    trigger:
      question-ids: [q7.10]
      score-band: low
    priority: medium
    free-tier-visible: false
    diagnostic: |
      Your formal IP or regulatory barrier position isn't described with sufficient
      specificity. The assessment doesn't address whether formal IP is relevant to
      your model. Many early-stage companies have no filed patents or formal regulatory
      licences; this isn't inherently a problem. The issue is the absence of a
      clear-eyed assessment of whether formal IP should be a priority and what
      protection your model relies on instead.
    gap: |
      Later-stage investors and acquirers assess formal IP as part of company
      valuation. A company that hasn't considered its formal IP position at all,
      or that describes informal advantages as if they were formal ones, is less
      prepared for that conversation than one that has thought through the question
      explicitly, even if the answer is "we don't yet have formal IP and here
      is why."
    fix: |
      Work through three questions to clarify your formal IP position:

      1. Does your core product or methodology contain anything that could be filed
         as a patent? Ask a patent attorney for a 30-minute assessment of whether
         your approach contains novel and non-obvious elements. This costs little
         and provides a clear answer. If there is a patentable element, decide
         deliberately whether to file.

      2. Does your market require regulatory licences, accreditations, or government
         approvals that create a structural access barrier? If so, are you pursuing
         them, and what is the timeline? If already held, name them explicitly in
         pitch materials.

      3. If formal IP isn't relevant to your model, state why explicitly and
         identify the structural protection you rely on instead. "We have no filed
         patents because the speed of iteration in our market means a process patent
         would be obsolete before it was granted; our defensibility comes from the
         proprietary dataset built from 4 years of customer integrations" is a
         complete and credible answer.
    estimated-impact:
      dimension-score-uplift: 3
      confidence: low

  # -----------------------------------------------------------------
  # Competitive map partial - medium band
  # -----------------------------------------------------------------
  - id: competitive-map-partial
    trigger:
      question-ids: [q7.1]
      score-band: medium
    priority: high
    free-tier-visible: false
    diagnostic: |
      Your competitive landscape covers direct competitors but does not
      yet address indirect substitutes or the do-nothing baseline.
      Investors reading a map that names only direct competitors conclude
      that the most common buyer objection, 'we'll manage this with our
      existing tools', has not yet been examined.
    gap: |
      The do-nothing baseline is the alternative most buyers actually
      choose. Without addressing it, the competitive narrative doesn't
      explain the primary source of deals that don't close.
    fix: |
      Add two sections to your competitive map:

      1. Indirect substitutes: name what a buyer does today if they don't
         purchase a purpose-built solution. A spreadsheet, a manual
         process, a team workaround, an adjacent tool repurposed for this
         job. These alternatives define the status quo being displaced
         and the switching cost you face from the market leader that
         never appears on a comparison grid.

      2. The do-nothing baseline: describe what happens to a buyer who
         defers the decision for 12 months. What accumulates, what gets
         more expensive, what risk grows? This is the urgency argument
         that shortens long sales cycles.

      This week: ask your most recent 2-3 customers what they were doing
      before they bought from you. Their answers are your indirect
      substitute category, named from real customer evidence.
    estimated-impact:
      dimension-score-uplift: 5
      confidence: medium

  # -----------------------------------------------------------------
  # Network effects partial - medium band
  # -----------------------------------------------------------------
  - id: network-effects-partial
    trigger:
      question-ids: [q7.8]
      score-band: medium
    priority: medium
    free-tier-visible: false
    diagnostic: |
      Your network effect or data flywheel mechanism is described but the
      account doesn't identify the critical mass threshold or the specific
      way accumulation produces a compounding advantage. Without those
      elements, the argument describes a product that improves as it grows
      rather than a flywheel that becomes self-reinforcing.
    gap: |
      A mechanism without a threshold and a compounding rate leaves
      investors uncertain whether the effect is meaningful at current
      scale. Effects that require a much larger base to activate are
      valued at a discount to those already in operation.
    fix: |
      Add two elements to your mechanism description:

      1. The threshold: at what scale does the effect become materially
         self-sustaining? If you don't yet know, state the assumption
         you are designing toward and how you will know when you have
         crossed it: a specific metric that should improve as the base
         grows.

      2. A compounding proxy: is there any measurable signal the effect
         is already operating at current scale? Time-to-first-value
         shortening as the customer base grows, recommendation accuracy
         improving with data volume, or a metric that gets better for
         every customer as the total count rises. Even a small early
         signal is worth naming.

      This week: identify one metric in your product that should improve
      as the user base grows. Track it from the earliest period available
      to now and assess whether the trend supports the flywheel claim.
    estimated-impact:
      dimension-score-uplift: 4
      confidence: low

  # -----------------------------------------------------------------
  # IP barriers partial - medium band
  # -----------------------------------------------------------------
  - id: ip-barriers-partial
    trigger:
      question-ids: [q7.10]
      score-band: medium
    priority: low
    free-tier-visible: false
    diagnostic: |
      Your IP or regulatory position is described but not yet connected
      to a replication barrier: the time, cost, or structural constraint
      that prevents a well-funded competitor from matching the position
      within a relevant timeframe. A described asset without that
      connection is noted but not yet investor-grade evidence.
    gap: |
      IP and regulatory assets are most valuable to investors when they
      can be translated into a specific cost or time that a competitor
      must bear to replicate them. Without that translation, the asset
      is real but the moat argument built from it is incomplete.
    fix: |
      For each IP or regulatory asset, add one sentence connecting it
      to a replication barrier:

      1. For a patent or application: describe the specific action a
         competitor must take to avoid infringement. A patent that
         requires competitors to change their core architecture is a
         meaningful barrier; one that can be designed around easily is
         not. Your legal adviser can characterise this.

      2. For a regulatory licence or accreditation: state how long the
         same credential takes to obtain and whether any requirement
         (operating history, capital reserve, track record) creates a
         structural delay for fast followers. A credential that takes 18
         months to obtain is an 18-month head start.

      This week: write one paragraph describing each formal IP or
      regulatory asset and the replication constraint it imposes. Share
      it with your legal adviser to confirm accuracy before using it
      in investor conversations.
    estimated-impact:
      dimension-score-uplift: 3
      confidence: low

  # -----------------------------------------------------------------
  # Category path partial - medium band
  # -----------------------------------------------------------------
  - id: category-path-partial
    trigger:
      question-ids: [q7.11]
      score-band: medium
    priority: low
    free-tier-visible: false
    diagnostic: |
      Your five-year category path describes the destination and names
      milestones on the way, but the milestones are structured as
      time-based events rather than conditions grounded in market or
      competitive signals. Time-based paths are harder for investors to
      evaluate because they cannot be tested against current dynamics.
    gap: |
      A condition-based path answers the question "what happens if those
      milestones slip by 18 months?" by tying each step to a market
      signal rather than a calendar date. Without conditions, the path
      relies on schedule adherence rather than market readiness.
    fix: |
      Convert the milestone sequence from time-based to condition-based:

      1. For each major milestone on the path, replace the timeline with
         a market or competitive condition: "We expand from the initial
         vertical once we hold 15% market share and have at least one
         referenceable customer in the adjacent segment." That condition
         is testable from outside the company.

      2. Name the one condition most likely to determine whether the path
         proceeds on schedule or requires adjustment. That is the most
         critical assumption in the category leadership thesis, and
         naming it demonstrates it has been examined.

      This week: rewrite the milestone sequence with conditions in place
      of timelines and review whether each condition is achievable given
      the current capital plan and the traction evidence so far.
    estimated-impact:
      dimension-score-uplift: 3
      confidence: low

  # -----------------------------------------------------------------
  # Validation partial - medium band
  # -----------------------------------------------------------------
  - id: validation-partial
    trigger:
      question-ids: [q7.12]
      score-band: medium
    priority: low
    free-tier-visible: false
    diagnostic: |
      External validation of your competitive positioning exists but
      comes from sources with limited independence: advisors connected
      to the founding team, early customers whose view may reflect
      relationship loyalty, or general industry commentary rather than
      direct competitive comparison.
    gap: |
      Validation is most useful to investors when it comes from sources
      with both domain expertise and independence from the founding team.
      The further the source from the founding team's influence, the
      higher the evidential weight.
    fix: |
      Identify one additional validation source with higher independence:

      1. A prospect who evaluated your product against multiple alternatives
         and chose you. That evaluation, by definition, reflects an
         independent comparison. Ask them whether they are comfortable
         describing the evaluation process to an investor. Their account
         is more credible than any internal characterisation of the result.

      2. An industry analyst, sector-specialist journalist, or research
         report that characterises the competitive dynamics in your market
         and whose framing is consistent with your positioning. A public
         citation from a named source is independently verifiable.

      This week: review your last 3 competitive sales wins and identify
      whether any prospect evaluated 2 or more alternatives before
      choosing you. Ask the most recent one if they would be comfortable
      describing that evaluation to one of your investors.
    estimated-impact:
      dimension-score-uplift: 3
      confidence: low
